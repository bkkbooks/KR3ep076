body:
  text: 副卷一一肝風案暴怒傷陰肝之變動為握右手掉搖膻中隱痛容冬進補中益氣而愈現在復發擬補陰益氣煎補陰益氣煎進補陰益氣掉搖已止膻中隱痛諸風掉眩皆屬於肝戰慄動搖火之象也良由水不涵木肝火化風壯水制火乙癸同源主治六味地黃加銀柴胡白芍橘皮蜜丸案月之初日頭痛氣促自服疏散無效更增心悸手臂掉搖肝之變為動心之變為悸腎之動為慄氣勃動肝腎不養肝肝火上潛戰慄之病生焉大熟地遠志筒於白朮雲茯苓孩兒參酸棗仁白歸身炙甘草案天一生水生人男女皆同女子以血到為始名曰天癸男子以精到為始亦名曰天癸幼年通精過早加以情欲之偏剝喪頻頻導致真元損耗液絡大虧六脈洪大而急咽嗌結核瘰癧串久不消今春左足潰膿血上下左右四肢串腫而痛晝夜無眠不能反側每至睡將熟則肢節攣搐動搖夫生人起居動息臥則血歸於肝經云肝為剛臟又云肝苦急急則酸燥陽生風動善搐善搖水不榮木靜不能藏是以目瞪神迷一哭而散哭之所以能散者上竅宣泄清氣有時而升暫可平靜久之非所宜症勢棘王滋水養肝為主鹿角膠福橘絡生熟地鮮竹茹龜板膠絲瓜絡赤白首烏參橫須虎骨膠松節油霜桑筋歸橫須清阿膠粉草節黑芝麻蔥白鬚人乳據云服藥數帖症勢未見動靜此症系肝血不充絡氣燥不養筋經云軟短為拘陷脈為僂者是也茲擬滋肝養血舒筋蓋水能涵木緩緩培養仍外加以熏絡庶不致增劇清氣活絡無裨也鹿角膠鮮生地上桂心桑寄生龜板膠赤首烏淮牛膝女貞子陳阿膠左牡蠣湖丹皮生甘草二頭風案頭風起自幼年不俱四季皆疼疼時太陽發脹牙關亦然飲熱茶汗出則止每晨起午後漸止延今多載飲食如常不能充養形骸精神日減脈弦無力肝擾陽明補中益氣湯加明天麻香白芷細茶葉案頭風多年發於四季發則脹疼十餘日方止秋冬之際四肢作冷頭脹作疼近日午後較甚陽虛陰虧脾腎雙補六君子湯合六味地黃丸加天麻半夏川芎恙由耳後沖及巔頂項強神煩不能起坐六脈細數而軟食減作痛時作時止初起似屬偏頭風證補散難投虛風遊走風化為火風愈高火愈熾陽不能固陰不能斂擬扶陽斂陰俾氣行血流風行水動庶可獲效甘菊炭抽耆皮白茯苓綠豆殼甜杏泥白赤首烏黑芝麻新稻穗蘇荷尖大生地三眩暈案水虧於下火升於上壯火食氣上虛則眩頭暈足軟如立舟車咽喉乾燥夢泄頻作少陰腎脈上循喉有夢而泄主於心精不化氣水不上潮之明驗也清上實下是其大法第水虧必盜氣於金金衰不能平木水虛不能涵木木燥生火煎熬津液成痰丹溪所謂無痰不作眩是也脈來軟數兼弦值春令陽升防其痙厥也法宜壯水佐以化痰六味地黃丸加製半夏沙苑子案經以上氣不足腦為之不滿耳為之苦鳴頭為之苦傾目為之眩素本脾胃不足抑鬱不宣氣鬱生痰上擾清明之府顛眩如駕風雲卒然潰亂忽而神清非類中可比脈來軟數無神原當壯水之主上病下取滋苗灌根第痰伏中州清氣無由上達下取無以上承擬以治痰為主製半夏三兩廣橘紅一兩五錢制南星一兩銀柴胡一兩五錢炒白朮二兩高麗參二兩五倍子一兩綠升麻八錢明天麻一兩淨歸身二兩川芎一兩上藥用竹瀝三兩薑汁一兩泛丸四虛損案心為主宰腎為根本曲運神機勞傷乎心心神過用暗汲腎陰子午不交寤而不寐經云經脈橫解腸癖為痔亦由濕熱傷陰氣虛不化右脈虛大而弦左脈濡滑腎之陰虧肝之陽強心氣不足脾為太陰濕土虛則生濕利濕傷陰清熱耗氣陰虛忌燥熱陽虛忌苦寒宜從心脾腎進補潞黨參三錢原熟地八錢甘杞子三錢木茯神三錢野於術三錢菟絲子鹽水炒三錢柿霜二錢大麥冬三錢案年甫廿三脈不應指二天不振心腎交虧瘰癧難痊氣血傷而未復心跳作嘔先養心脾兼調肝腎歸脾湯加熟地炭案經以喜怒傷氣寒暑傷形衝脈起於氣街夾臍上行至胸中而散衝脈動諸脈皆動少腹屬厥陰厥陰者肝氣也從少腹跳動沖逆上行心慌意亂虛里跳躍如梭腎不養肝氣失攝納皆根蒂之虧寡欲固精清心尤要六味地黃丸加潼沙苑生牡蠣馬料豆案年經廿旬先天薄弱後天不振盜汗夢泄上年六月奔馳辛苦痰中帶血每逢節令舉發去冬感寒停滯病中又傷盜汗甚多昏沉似脫病中走泄曾服參附回陽漸漸向安臥床月餘今交夏至飲食不香午後肩背似乎拘束不舒食後噯氣肢體無力筋骨痠痛腰膝尤甚若稍煩心即覺心中疼痛氣悶小溲黃色俱多清時日少舌根之苔病後至今未化面無華色脈來虛數正氣腎氣傷而未復少壯年華必得清心靜養冀其復元進後天以培先天歸脾湯去耆加熟地冬蟲夏草案自汗陽虛盜汗陰虛有夢治心無夢治腎咯血痰血血絲夾血點皆屬臟陰不藏心火一動相火隨之水不涵木木火升騰莫制血隨氣升心火下注頻頻夢瀉神志不藏也昨夜夢泄甚多非漫溢也乃心動神馳心相不靜速當清心保腎固守關元能不再泄方為佳兆紋潞黨煨木香大熟地大麥冬砂衣炒棗仁朱茯神淮山藥左牡蠣炙遠志去心桂圓肉案腎為先天脾為後天二本皆虧未老先衰精神不振心悸頭眩手足心熱腰背痠軟便紅脫肛兼有內痔中氣腎氣皆虧法當培補真元靜養為妙淮熟地五兩上黨參四兩白歸身三兩熟棗仁二兩紫河車麻油炙一具烘冬朮三兩側柏葉三兩雲茯苓神各二兩玄武板酥炙三兩燕根三兩胡芡實三兩建蓮肉三兩上藥用桂圓肉玉竹藕汁各三兩熬膏為丸案咳嗽夜甚勞動氣喘夜臥不安手心蒸熱精神不振巔頂疼痛形容日羸脈來弦數按之無力三陰內虧金水交傷陰虛忌燥熱陽虛忌苦寒虛勞內損二氣皆虧全賴脾胃資生化源擬以小海參丸加減海參連泥瓦上炙枯三兩冬蟲夏草三兩製半夏二兩淮山藥四兩杜阿膠二兩大熟地八兩薄橘紅一兩五錢白茯苓三兩小牡蠣五兩紋黨參三兩京川貝去心一兩五錢老蘇梗一兩五錢燕根三兩潼蒺藜三兩煉蜜為丸案諸風掉眩皆屬於肝左脈甚小心肝腎三陰皆虧腎不養肝心氣益虛右脈濡而且慢真陽亦衰頭目眩暈不耐操勞寒涼者真氣之虛也經以勞者溫之損者益之本擬龜鹿二仙膠現在中虛寒痰先擬參附理陰合歸脾明黨參甘枸杞子白茯神炙粉草川熟附獨枝歸身酸棗仁桂圓肉大熟地土炒白朮遠志肉去心脈神形色俱起眩暈漸減中氣心氣腎氣皆虧水不涵木木火交併二氣俱損補陰不易補陽尤難陰從陽長血隨氣生前進黑歸脾尚合機宜今擬參附斑龍加味參附湯龜鹿膠熟地枸杞山藥茯神山芋肉菟絲子舌為心竅舌尖屬心舌中屬脾舌邊屬肝舌根屬腎舌尖旁右邊或數日一麻含桂圓少許即好顯繫心氣虧虛思為脾志實本於心不獨曲運神機也左右者陰陽之道路也水火者陰陽之徵兆也人身之氣血百骸貫通總得陰陽二氣源源相濟進黑歸脾甚合機宜仍以斑龍合參附歸脾培生生之氣鹿角膠紋黨參炒棗仁白歸身菟絲子熟附片炙遠志去心炙甘草大熟地甜冬朮木茯神龍眼肉麥門冬去心鮮金釵甘枸杞水不配木腎不納氣氣不歸元氣有餘便是火右腎熱氣常漫帶多走泄精神不振腎屬水虛則生熱補陰不足補陽尤難脈象六陰按之虛數不靜心腎兩虧今擬黑歸脾合斑龍兩儀起元法培命腎之陰陽冀其水火既濟自然納氣歸窟鹿角膠酒炒三兩黨人參四兩酸棗仁炒三兩花麥冬五兩鹿茸酥炙一具大熟地砂仁拌炒八兩遠志筒去心甘草水炒一兩五錢甘枸杞子八兩菟絲餅鹽水炒三兩大有耆蜜炙三兩木茯神朱染四兩桂圓肉八兩龜板膠三兩於潛術土炒三兩白歸身酒炒三兩新會橘四枚柏子霜去油一兩五錢南木香煨五錢粉甘草蜜炙五錢上藥用枸杞麥冬桂圓黨參福橘熬膏和丸案悟性不達靈機不活也巧發於腎靈發於心十歲始能言語固由心氣不足實由先天薄弱不能上達於心未行之事取之於心已往之事記之於腎出言吐語似是而非乃神志不藏也不可開竅當補先天啟振元神當知靜則生慧混沌皮三錢敗龜板酥炙三錢大熟地四錢遠志筒去心炙八分年已二旬尚屬童年毫無知識靈機矇蔽小解如常脈來細小先天不足神識不開開竅不能必得神志充足靈光自透養先天煉後天徐徐調養黑歸脾湯去黃耆每早服斑龍丸三錢案長生秘典曰內勞神明外勞質形形與神交用精與氣俱傷多言傷氣多勞傷腎心暢則胃開腎旺則脾健心腎得太和之氣自然食香神旺生脈散加陳倉米諸恙悉退元神未復氣軟胃弱經云腎氣通於胃補陰有開胃之功扶脾有生陽之妙擬脾腎雙補法上黨參云茯神上廣皮肉蓯蓉炒於術炙甘草老陳米甘杞子案上損於下損及於中最屬可慮男子脈大為勞三陰內損下患痔漏咳嗽氣急嘔吐酸水補土則金生金生則水旺諸虛百損不捨脾胃有胃氣則生無則死洵不誣矣異功散加黃耆山藥冬蟲夏草須穀芽案精氣神乃人生之至寶為先天立命之基二天不振水不配火形瘦食減浮火時升下有痔瘍常多夢瀉三陰內虧壯水之主以鎮陽光六味地黃丸加川黃柏槐角穀芽菊花案驚則氣怒傷心恐則氣怯傷腎由此二氣致偏偏久致損損不能復變生痞象現氣不生陰陰不化氣春旺木乘中土受傷水精不布揆度失常面色如妝肉山已倒生氣去矣所服滋生化源無以加焉擬方候酌歸脾湯去耆加穀芽服藥後未曾嘔吐溏糞一次小便通暢喉中痰聲稍減吐痰照舊仍不思食滋陰則礙脾脾喜燥而腎惡燥有胃氣則生無則死營出中焦資生於胃補土則金生仍仿前法候裁正人參五分於白朮三錢杭白芍五錢白茯苓三錢附子片童便浸蜜炒七分左牡蠣一兩淮山藥五錢老薑渣米湯炒一錢後加藕粉炒阿膠二錢頃奉手教敬念令媛恙原春分節令未有變動藥分三次徐徐服之未作嘔吐仍覺胸中飽悶漸漸方舒每日食粥三次每食一茶杯不能多進大便間或溏瀉小便暢行陰陽漸分夜眠較安面色黃瘦飲食不為肌膚顴紅漸退咳痰稍減脈症漸定即是轉機徐徐調治漸入佳境擬方酌候肅此奉復並璧尊謙照前方加荷葉煨飯案脈來細澀形容消瘦臟陰營液俱虧食少運遲不為充養臥則氣促三刻腹右氣墜兼有偏墜脾胃不健先天不足後天不振養先天煉後天冀真元來復是其大法歸脾湯去黃耆加炒穀芽南棗脈來細澀眠食雖安運納不健二天不振養心脾兼和肝胃黑歸脾湯去黃耆加生熟穀芽脈神形色俱起眠食俱安運納健旺二天有振之機原方加減前方去穀芽服藥以來脈神色俱起胃口大開生氣來矣以丸代煎乘鸞之後蟲斯衍慶益當加意節制先天源源而厚百福駢臻蘭徵必矣原熟地藕汁炒八兩云茯神朱染四兩桑螵蛸鹽水炒二兩化橘紅一兩淮山藥焙四兩福澤瀉鹽水炒三兩料豆衣炒三兩肥葳蕤二兩山茱萸鹽水焙四兩冬青子五兩雞頭實焙三兩寧子淡漂淡三兩湖丹皮酒炒三兩山旱蓮八兩燕根去毛炙四兩老藕三斤上藥用玉竹二至藕熬膏為丸案心脈短肝脈虛尺脈小性燥多慮心氣虧虛不耐操勞客秋瘧後失調右脈濡滑濕鬱氣虛神倦無力時發寒熱多走氣急二氣虧虛喜怒傷氣寒暑傷形擬何人六君加味何人飲合六君子湯加升麻柴胡客秋瘧後失調不耐操勞二氣虧虛宗經旨勞者溫之損者益之十全大補湯加附子半夏淡蓯蓉案氣不生陰精不化氣精神不振五心煩躁日晡寒熱總由水火不濟三陰不足大熟地山茱萸湖丹皮大麥冬潛葳蕤菟絲子云茯神炙遠志淡菜精神不振飲食不甘五心煩躁寤而不安脈來虛數三陰不足心腎不交水火不配以丸代