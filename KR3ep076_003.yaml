嗽血點未見肝虛易怒非肝家之有餘乃肝陰之不足先天薄弱仍守原方六味地黃丸加南沙參橘紅楂肉穀芽案經以喜怒傷氣寒暑傷形大怒則形氣絕而血菀於上陰維為病口苦心痛胸脅背亦痛痛則牽引脹滿曾服旋覆代赭歸芍地黃作肝腎治理路甚善其不效者陽明之病氣血鬱結肝為起病之源胃為傳病之所先治陽明再養肝腎中氣久傷不可不理補中益氣湯加南山楂案幼年失血頻頻舉發延今多載屢愈屢發客冬吐紅十餘口血止之後今春兼憂思動怒肝不藏血火載血上咳嗽口乾木扣金鳴脈來虛數肝不平寧又值火令司權謹防喉痛音啞犀角地黃湯加杏桃仁茜草根旱蓮草牛膝麥冬茅根童子小便服藥十餘劑木不擊金不鳴絡和血止咳平熱靜惟喉內咽津似物阻礙湯食並不礙入乃舔氣也擬養腎滋肝清心保肺八仙長壽丹加桔梗枇杷葉肺司百脈之氣肝藏諸經之血腎司生命之本咳嗽失血痰中又帶午後浮火時升常多走泄欲圖生機必得下關速閉舍此無濟二至丸加石斛生地白芍杏仁丹皮茯苓茅根甘草童便案三月初旬風濕上受發熱三日吐血鮮紅四月中旬血又復來至今不斷兩脅微痛胸次亦然仍防湧逆失血之脈貴乎寧靜脈來滑數火犯陽絡極難奏效犀角地黃湯加山旱蓮山梔甘草童便藕赤砂糖痰血未清右脅痛止左脅依然脈之數象稍平原方兼和肝胃前方去犀角山梔紅糖加參三七牛膝杏仁紫蘇梗案始因傷力中傷肺虛咳嗽痰紅紅紫不一未吐之先心中作癢如蟹行吐沫隨即吐血已歷數載得黃痰咳喘乃平積飲為患杏蘇二陳丸加桔梗桃仁款冬藕肉案年甫二旬季春突然失血盈碗血色鮮紅脈見芤象火犯陽經血絡受傷陽旺陰虧陰不和諧犀角地黃湯去白芍加旱蓮麥冬牛膝茯苓黃柏山藥鮮藕每早童便一杯案咳為肺病喘為腎病夢為心病素有失血痰多氣急不耐風寒每逢冬令喘嗽甚則痰嘶早晨痰沫多咸常有夢泄肺腎交虧虛寒不化氣失攝納附都氣丸加蘇葉服附都氣痰喘未發仍是走泄心腎交虧以膏調治鹿角膠二兩大麥冬三兩抱木神三兩梨十個川熟附八錢冬蟲夏草一兩五錢淮山藥三兩福橘五個大熟地八兩遼五味五錢老蘇梗一兩五錢白藕一斤上藥用清泉水熬汁以半夏粉收膏案始因咳嗽失血服歸脾而止加熟地不受延今咳嗽不寧夜吐白痰日間時吐清水紅痰心口微痛中傷肺損所嫌兩顴發赤怕春陽升動咳逆血上之患白蒼膏加阿膠白芍白朮半夏山藥杏仁冬蟲夏草案經以大怒則形氣絕而血菀於上客秋氣郁失血兩口冬月操勞過極又復失紅三次每吐盈碗俱屬紫血臘月下旬出疹胸臆兩脅兼痛現在飲食難下心中懊憹難以名狀脈象細澀推之不甚寧靜誦讀吟詠多主傷陰七情不適水不養肝肝不藏血氣失攝納載血上行所嫌先天既虧脾胃不振最怕土弱不能生金咳嗽失血多紫不能見血報涼中生地荊芥炭淮牛膝炮薑炭旱蓮草湖丹皮生山楂鮮藕片人參三七汁次加杭白芍生甘草案脈象滑數而軟左部微弦恙因肝陰不斂火燥氣衝血不歸經逆而上犯初起為火久則成怯大生地生牡蠣貢白芍雲茯苓紫丹參淮牛膝川石斛嫩蘆根沉香汁肝火沖竅痰涎帶紅所喜不咳肺未傷而血出於胃經云諸血症最險惟胃無傷以胃為水穀之海屬火屬濕故也然初起為濕火久則氣血虧不可不慎小生地左牡蠣宣木瓜淮山藥玄武版牡丹皮金狗脊去毛新絳
