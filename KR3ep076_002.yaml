body:
  text: 正卷一真中風案邪之所湊其氣必虛卒然傾跌神識不清口眼喎斜語言謇澀溲赤而渾苔黃而厚脈來沉數陰虧水不涵木七情鬱結化火風邪乘襲厥陰橫擾陽明目為肝竅胃脈挾口環唇肝在聲為呼胃受疾則噦諸汗屬陽明謹防呃逆鼾呼大汗擬玉屏風散升麻葛根湯二方加味外以桂酒塗頰玉屏風散升麻葛根湯加生地歸身桂酒塗頰法肉桂三錢研末高燒酒二兩煎百沸塗兩頰不必拘左右加入馬脂更妙昨藥後夜來神志漸清語言漸爽黃苔漸腐身有微熱微汗大解一次溲轉渾黃沉數之脈依然口目喎斜未正證本陰虛火盛情志乖違腠理開疏為風所襲擾亂厥明之絡原方加減仍以桂酒塗頰前方去升麻加黨參厥陰為風木之臟陽明為十二經脈之長真陰素虧肝木自燥木燥召風虛風直襲攻其無備是以卒中之也連進玉屏風散升麻葛根湯二方加減神識已清語言已爽飲食漸進身熱得微汗已解大便如常溲色較淡黃腐之苔漸退沉數之脈亦緩惟口目仍斜風淫未盡真陰未復原方加減仍以桂酒塗頰玉屏風散加煨葛白芍獨活黨參生地歸身諸恙悉平惟口目之斜較前雖好未能如故口目常動風生故焉耳鼻常靜風息故焉肝氣通於目胃脈環於口必得肝胃沖和口目方能平復原方增損仍以桂酒塗頰前方去獨活加白蒺藜恙原已載前方惟口眼仍斜未能如故肝為藏血之臟胃為水穀之海症本血燥召風風翻胃海氣脈為之動變霾曀上冒清空分布不周於本絡以故口目喎斜斜乃風之象也服藥以來風淫雖解未盡陰液雖復未充氣脈未能流暢水能生木土能培木當以脾腎為主擬六味歸脾加減為丸以善其後六味地黃丸去山芋歸脾湯去木香元眼黃耆加肉蓯蓉水丸案年近七旬天令暴冷爐火左側太白頻浮酒漬於內熱炙於外左頰汗出如漿虛風得以乘之擾亂三陽之絡口喎於右目眇於左脈來浮數按之則緩擬玉屏風散二陳湯加味以輔正散風是否候酌玉屏風散二陳湯加煅牡蠣澤瀉鹿銜草次加黨參蘇梗疊進玉屏風二陳加味左頰之汗已收口目之斜俱正浮數之脈已緩風淫已散第因年高二氣本虧是以風邪易襲宜常服十全丸以杜未來之患案遍身麻痹口目蠕瞤眉稜骨痛按之益甚年逾四旬形豐脈軟風襲陽明營衛俱傷血凝氣阻名曰肉苛慎防傾跌補中益氣湯加防風薑棗經以營氣虛則不仁衛氣虛則不用營衛俱虛則不仁且不用肉如故也服補中益氣加味半月以來苛痹漸蘇瞤動漸止營衛風淫漸散眉稜骨痛已平軟散之脈已斂胃者衛之原脾乃營之本升補中州以充營衛前賢良法原方加減為丸緩治補陰益氣煎加大黃耆防風水炒薑棗水丸案經以虛邪偏客於身半其入深內居營衛營衛虛則真氣去邪氣獨多發為偏枯身偏不用而痛言不變志不亂病在分腠之間益其不足損其有餘乃可復也參附湯玉屏風散四物湯加桂枝獨活炙甘草虎脛骨乳香沒藥水丸案形充脈弱氣歉於中分腠不固常多自汗為風所引腎水上泛脾液倒行凝滯成痰隧竅阻塞卒然昏聵無知氣促痰鳴言謇舌苔白滑胸次不舒木旺金衰正不敵邪防其汗脫藿香正氣散去白芷川樸腹皮加制南星自喊巔痛問之則否身有微熱微汗肌膚粟起眠不竟夕痰涎上湧苔白滑胸痞言謇欲大解則小便先行淋漓不爽六經混淆二便互助七情內傷風淫外襲昨進藿香正氣加減未見效驗正不敵邪謹防大汗前方加人參八分正氣散護衛外以祛風六君湯益中土以清痰服後神識已清夜來安寐身熱退自汗收舌強和痰聲息脈弱起邪退正復之兆惟右肢苛痹乃偏枯之象證本脾腎雙虧氣虛夾痰分布不周風淫末疾前方加減為丸緩治六君子湯加天麻黃耆防風水炒竹瀝薑汁泛丸案二氣貫於一身不必拘左血右氣偏枯於右痛無定止逢陰雨煩勞益甚乃風痹之屬延今二載有餘脈沉澀無力食入作嘔大便恆溏風淫於胃濕著於脾分布不周於脈絡致有陰陽易位更虛更實更逆更泛之患外以晚蠶沙煎水洗患處潞黨參二兩全當歸四兩虎脛骨三兩雲苓塊五兩炙黃耆五兩青防風八兩以羊肚一具生薑三兩川椒三錢竹油三兩粳米半升煮爛取汁為丸案五行之速莫如風火邪之所湊其氣必虛風邪卒中必夾身中素有之邪素本陰虛火盛火召風入風彰火威風火盤旋形神如醉消穀善飢溲赤苔黑心火暴甚腎水必虛肺金既摧肝木自旺宜先服瀉心湯觀其進退半夏瀉心湯案曾經傷風咳嗽痰多漸至步履欹斜語言謇澀痰涎上溢三載以來痰嗽由漸而止現在涎唾不禁舌蹇難言身形強直脈來弦數腎陰素虧子竊母氣肺損於上為風所引傳之於肝肝主一身之筋筋弱不能自收肝復傳之於脾脾傷則四肢不為人用脾復傳之於胃胃緩則廉泉開故涎下不禁所服之方都是法程寡效者病勢苦深也長沙云病勢已成可得半愈病勢已過命將難全勉擬一方以盡其心力六君子湯加熟地炮薑歸身二類中風案舌強語言謇澀右臂麻木不舒言乃心之聲賴肺金以宣揚脾主四肢其用在右心火盛腎水虛將息失宜五志過極濕土生痰機竅不利脈來三五不調類中復萌已著理陽明和太陰佐化濕痰不致陰陽離決方克有濟二陳湯加黨參白蒺藜殭蠶竹茹類中復萌舌強言蹇右臂屈伸不利心火暴甚腎水虛衰智意不和濕痰阻竅本擬瀉心法緣脈來甚慢如結代之狀尺部尤甚仍從中治理陽明和太陰亦可保其心腎六君子湯加鮮首烏白蒺藜殭蠶兩進理陽明和太陰佐化濕痰舌強漸和語言漸展右肢麻痹亦舒胸次反覺不暢清涎上溢濕痰未化心火未平脈仍三五不調未宜驟補原方加減二陳湯加首烏白蒺藜殭蠶桑葉脂麻病原疊載前方服用以來舌強漸和語言漸爽肢痹已蘇胸次漸暢經以心脈系舌本腎脈循喉嚨夾舌本脾脈連舌本太陰不營濕痰自生腎水不生心火自盛必得三經平復水升火降中土暢和機竅自展現濕土用事肝火司權暫以桑麻六君加味崇土養營和肝熄風引益腎水六君子湯加桑葉脂麻菊花水丸案偏枯於左口喎於右舌強語謇涎下不禁脈來甚慢大筋軟短小筋弛長濕熱不攘中虛痰鬱為患六君子湯加羚羊竹瀝薑汁案目盲不可視足廢不能行小便或秘癃或不禁飲食如故臟病腑不病心腎乖違情志鬱勃隧竅阻塞昔魏其侯傷意病此名為風痱議劉守真地黃飲子地黃飲子案經言陽之氣以天地之疾風名之卒然昏聵無知柔汗溲便遺失四肢不收口噤不語脈來遲緩因煩勞太過擾亂二十五陽陽氣變動氣不歸精精無所倚精不化氣神無所倚乃陰陽離決之危候也勉擬景岳回陽飲追斂散亡之氣未識陽能回否六味回陽飲午正進藥申未汗收神志漸清語言漸展肢體自能徐轉脈象小駛於遲惟心煩意亂莫能自主乃陽回陰液未復進銳退速危症得安乃天幸非人力也前方加抱木茯神陽回陰液未復心中憒憒不安肢體雖和語言尚謇脈小駛於遲曰緩經以無陽則陰無以生連進回陽生陰之品頗合機宜安不忘危善後更宜加意六味回陽飲去附子加茯神酸棗仁恙原俱載前方毋庸復贅惟心煩不安乃陽回陰液未充腎不交心陰不上承最宜持心息慮當思靜則生陰之理六味回陽飲去附子加二至丸茯神棗仁服五帖後更以十劑加五味子水丸案旋轉掉搖火之象也志意煩惑陰液虧也腎虛無以榮肝一水不勝二火木橫土虛壯火食氣血熱化風乃痱中之漸當以脾腎為主水能生木土能培木水為物源土為物母水土平調肝木自榮則無血燥化風之患故陳臨川曰治風先治血血行風自滅擬六味四物歸脾合為偶方主治六味地黃丸四物湯歸脾湯水丸案陰虧於前陽損於後陰陽相失子午不交卒然昏聵無知口開不合涎流不止神敗於心精敗於腎在經之氣脫於陽明在臟之氣脫於太陰脫絕已著雖司命不可為也勉以回陽一法追斂散亡之氣於烏有之鄉以副諸明哲冀望回春之意參附湯加熟地油桂炮姜案經以擊僕偏枯痿厥肥貴人則高粱之疾也形豐柔盛於剛志樂氣驕多欲七情五志失其中炙煿肥甘過其當致令皮肉筋骨不相保卒然傾跌右肢偏廢而不用天產作陽厚味發熱陽熱蒸騰動中無靜陰虧可知法當靜補真陰為主崇經旨承製之意仍須薄食味省思慮方克有濟六味地黃丸二至丸案素耽酒色心腎本虧精損於頻氣傷於漸卒然神志沉迷口眼喎斜語言謇澀慎防汗脫脈來微細如絲當從色厥論治生脈散加熟地山藥山芋製附子案經以暴病暴死皆屬於火火性疾速故也卒然昏聵無知脈象洪空勁直口開手撒遺溲自汗痰鳴氣促真陰枯涸心主自焚五絕之中茲見三證雖司命不可為也所議人參竹瀝蘇合香丸極是愚見更益以鎮固之法以副或免之望老山參三錢淡竹瀝三錢蘇合香丸一粒外以生鐵約重八兩燒紅江醋沃之近病人口鼻使氣熏入三傷寒案傷寒惡寒寒傷營血澀無汗皮膚閉而為熱頭身腰背俱痛脈浮緊溲色澄清大便五日不解尚屬太陽經症宜麻黃湯麻黃湯案苔白脈浮巔痛身疼惡寒發熱溲便自調痰溲氣促有汗不透風寒兩傷營衛俱病法宜解肌兼汗小青龍湯案發熱惡寒者發於陽也巔痛身疼無汗苔白胸痞脈象浮緊宜先開其表遂取九味羌活湯九味羌活湯案脈體尺寸俱浮證勢頭身俱痛翕翕發熱嗇嗇振寒稟賦雖充寒邪甚厲星馳無寐二氣乖違正逢月郭空虛遂罹霜露之疾謹擬南陽敗毒飲祛邪返正得汗便解人參敗毒散加生薑長流水煎昨進南陽法濈然汗出諸症恙平惟胸次不舒不思飲食溲色澄清大便未解餘氣未盡尚宜和里益氣健脾丸加炒穀芽神麯製半夏四暑症案氣虛脈虛身熱惡熱煩渴巔痛神倦火盛乘金熱傷元氣古名中暍寒以取之白虎湯生脈散加淡竹葉捲心案暑必夾濕氣之熏蒸著而為病濕寄望於四季隨六氣之變遷因暑而為熱傷陰傷氣神倦脈軟身熱自汗惡風口渴溲便自調不思飲食心脾肺三經互病擬東垣清暑益氣略為加減清暑益氣湯去升麻黃耆蒼朮加茯苓五濕症案脈來滑數無力證本濕熱傷陰五液日耗形神慵倦竟若骨痿不能起於床法宜補陰化濕苦寒雖效究非常服之方擬甘露飲加減川黃柏一錢金釵斛三錢淡黃芩一錢半潤玄參一錢半肥知母二錢天麥冬各兩錢天花粉三錢地骨皮三錢案濕熱蘊於陽明熏蒸肝木耗損腎陰肝主一身之筋腎統諸經之水陽明為十二經脈之長譬如暑濕鬱蒸林木萎弱以故體倦多眠熱蒸氣騰上干清竅唇瘍流液目澀羞明頰腫咽痛苔黃舌絳服養陰滲濕之品共六十餘帖病勢退而復進者證延六載之久藥淺病深之故也仍以補腎滲濕為丸緩治四君子湯二冬膏加生地棗仁澤瀉黃柏水連沙參水丸案壯火食氣陰不潛陽氣不行水蘊生濕熱傷陽明之陰動少陽之火陽明陰傷則宗筋縱不能束筋骨而利機關水流濕而注下足脛綿弱行則振掉便瀉腸鳴少陰火旺則液耗金傷不能藏精化氣以行治節痰嗽食減夢泄頻仍所服之方均法程王道功遲難期速效補陰當思濕熱蘊結利濕竊慮陰液愈虧爰以六味加減補陰滲濕脾腎雙培然否質諸明哲大熟地八兩雲茯苓三兩肥杜仲三兩川萆薢三兩山芋肉四兩五味子二兩淡蓯蓉二兩玄武膠二兩淮山藥四兩宣木瓜二兩上黨參三兩桑螵蛸一兩將熟地水煮搗如泥溶膠煉蜜為丸六火症案經以有者求之盛者責之壯水之主以制陽光者治相火有餘之法也知柏八味丸去山芋加敗龜腹甲案經以無者求之虛者責之益火之源以消陰翳者治相火不足之法也桂附地黃丸或加玉壺丹三分研末和服七伏邪案第二日憎寒發熱頭痛腰背俱痛苔白溲赤無汗脈數邪伏膜原外越太陽經也達原飲加羌活防風川芎生薑第三日惡寒自罷晝夜發熱日晡益甚頭身之痛較輕眉稜骨痛甚鼻乾不得臥苔白汗出不透脈洪長而數溲渾而赤伏邪外越陽明經腑不和不致神昏呃逆為吉達原飲加粉甘葛第四日得汗雖透熱仍不解反覺憎寒目沉不寐心煩喜嘔胸滿脅痛苔淡黃溲渾赤脈弦數伏邪並交少陽陽明小茈達原加減達原飲加柴胡生薑第五日煩嘔稍減夜得少寐寒熱依舊耳聾胸滿溲渾赤脈弦數原方加味主之前方加廣陳皮第六日昨進小茈達原飲加減服後大解一次色如敗醬渾赤之溲較淡夜寐稍安四更後心煩作嘔飲陳米湯少傾即止天明自汗身熱乍退唇燥舌乾脈仍弦數伏邪漸潰陰液耗傷慮生歧變春茈胡一錢知母肉二錢炙甘草五分鮮地慄四枚當歸身三錢京赤芍五錢上廣皮一錢逆水蘆根一兩淡黃芩一錢半第七日熱退脈不靜大便如敗醬溲渾如豆汁夜寐不沉胸痞不食心煩作嘔舌燥作渴苔黃不腐伏邪化熱傷陰最忌神昏苔剝呃逆之劇前方加天花粉第八日脈數便未解溲反渾近赤額前心下俱熱有汗肢微冷苔黃舌尖赤微有刺口燥作渴反喜熱飲神煩少寐邪伏少陽倒入陽明化熱傷陰熱極反兼寒化肢冷大便不解腑氣不通邪無出路原當承氣下結存陰二氣素虛姑從緩治大生地五錢當歸全三錢柴胡根一錢淡黃芩一錢半白知母二錢淮牛膝三錢炒枳殼一錢赤芍藥一錢半活水鮮蘆根二兩第九日服藥後更衣兩次色黑如漆中有瘀血額前熱退苔剝回潤煩渴減四肢和夜寐安數脈緩溲色漸淡苔黃漸腐伏邪賴腑氣宣通而漸化後陰為里之表邪伏膜原轉入陽明由大腸傳送變化出焉其路甚近與表邪從汗解之意同故大便解諸症減大便秘諸症加六淫在表當從汗解伏邪在裡當從便解攻下與發汗何殊伏氣與表邪一體胃為多血之腑脾為統血之臟便黑帶血胃熱迫血流入大腸病及至陰脾傷失統慮其大便復閉陽邪復聚仍以養陰通腑前方去茈胡枳殼加瓜蔞仁桃仁杏仁山梔甘草第十日案載前方原方加味前方加荸薺用長流水煎第十一日兩進養陰通腑登圊三次色紫黑有塊純是停瘀諸症悉除宵眠呼吸自若醒後神智安舒知餓思食身涼脈緩惟溲色猶渾胸前尚熱餘氣未盡伏邪解於血分真陰五液俱傷在內為血發外為汗汗即血也病從血下而瘳猶表邪隨汗而解後陰為里之表於茲可見遂補陰益氣以善其後補陰益氣煎案始得病不惡寒發熱而渴溲赤不寐服發表消導等劑汗不出熱不退延今四十餘日形容枯削肢體振掉苔色灰黑前後大解共十三次醬黑之色逐次漸淡至於黃溲亦渾黃不赤晝夜進數十粒薄粥四五次夜來忽寐忽醒力不能轉側言不足以聽脈微數按之不鼓年及中衰體素羸弱伏邪雖有欲解之勢元氣渺無驅逐之權邪熱縱橫真陰枯涸勢必邪正俱敗危如朝露急宜峻補冀其五液三陰一振正復不能容邪從中擊外庶幾一戰於表得戰汗則解生脈散加生地歸身茯神遠志棗仁蘆根扶邪斂氣輔正驅邪服後竟得戰汗寒戰愈時厥回身熱汗出如浴從朝至暮浸汗不收鼻息幾無真元幾脫急以前方連服二帖兩進前方浸汗旋收諸症悉退惟精神慵倦醒睡若迷此邪退正復之機邪正相持日久邪氣初息正返於經休息無為固當如是原方再服是方也本非發汗亦非止汗夫汗之出與汗之收皆元氣為之主宰氣為橐籥汗為波瀾前服所以汗出者藥力輔正從臟達腑由經出絡驅邪於表從汗解而汗不止者藥力不支正虛不可復收故以原方仍從某經某絡導其散亡之氣還之臟腑若投止汗之劑則大謬不然或增減一味亦不可藥性有歧迷途莫返故曰失之毫釐差以千里欲發汗而不知營衛之盛衰欲止汗而不知橐籥之牝牡是猶盪舟於陸駕車於海僕非不能再續一方故縷述為知者一道案六脈俱數浮取不足沉取有餘十日以來神昏如醉間或獨語苔淡黃不潤板齒無津目赤唇焦不飢不渴與湯飯亦受心下至少腹按之無痛滿大便如常溲色紅渾伏邪盤踞太陽熱入膀胱壬病逆傳於丙丙丁兄妹由是傳心心火爍金清肅不行犯經旨死陰之禁慮難有濟勉擬犀角地黃湯合導赤散加山梔取清心保肺導引邪火屈曲下行之意犀角地黃湯導赤散加黑山梔蘆根經以心病傳肺謂之死陰不過三日而死者不及金之生數也三服清心保肺竟過三日生氣復來清肅令行熱氣自退知飢欲食胃氣漸醒神識漸清溲渾尚赤導赤保肺犀地清心以迫丁邪返丙歸壬溲清則愈犀地湯導赤散去竹葉加茯苓澤瀉焦山梔黃芩活水蘆根案身熱汗自出不欲去衣者惡寒也正傷寒汗出惡寒為表虛伏氣則不然邪伏膜原外越三陽之表衛護失司腠理不密以溲渾赤為別非傷寒於表可比宜順其性以揚之不可執有汗用桂枝解肌仲景有桂枝下咽陽盛則斃之戒擬活人敗毒散加減敗毒散去前胡獨活加廣皮生薑傷寒汗出淋漓則病不除伏邪汗出淋漓則病將解昨暮服藥汗更大出發背沾衣通宵達旦湊湊不已遍體涼和六脈俱靜溲色澄清惟中胃未醒宜養胃生陰銀條參三錢淨歸身三錢白蔻仁八分陳倉米一兩鮮石斛三錢炒穀芽三錢陳橘皮一錢鮮荷鼻一個白茯苓三錢採云曲一錢半黑芝麻三錢案諸氣膹郁皆屬於肺諸逆衝上皆屬於火肺司百脈之氣腎藏五內之精腎水承製五火肺金運行諸氣悲則傷肺恐則精卻思為脾志憂本於心思則氣結憂則耗氣郁化心陰真氣潛消邪氣日進亢則為害五志之陽與邪渾一俱從火化爍陰耗液所謂熱蒸氣騰壯火食氣是也屢寐氣屢升不分左右似呻吟而近太息又非短氣寐則陽氣下交於陰血歸於肝氣歸於腎清肅不行蒸熱不退腎水不升肺氣不降金水交傷水火不濟肺熱奚疑飲入於胃輸於脾歸於肺注於膀胱溲赤是其明驗水出高源擬用一味蘆莖取其清空之氣甘平之力以達清虛而益氣化若雨露之溉盪滌伏熱即是補陰清金且兼開胃不亦宜乎活水蘆根四兩甘瀾水煎案脈伏而數巔痛身疼無汗翕翕發熱嗇嗇惡寒腠理致密玄府不開乃三陽表證也擬九味羌活湯加味羌活沖和湯加茯苓生薑服沖和湯加味得汗遍身悉潤寒熱已除巔疼已止浮數之脈已緩惟身痛不休乃表氣未和宜桂枝湯小和之桂枝湯服桂枝湯入夜神煩不寐身反大熱脈反滑數苔白如積粉板滯不宣汗出如浴惡風不欲去衣溲赤而渾間有譫語此伏邪內動盤踞膜原化熱傷陰之漸經以冬傷於寒春必病溫夏必病熱蓋始為寒而終成熱同氣相求傷寒遇寒則發前服沖和湯諸症乍退者新感之寒邪從汗而解身痛未除者伏邪乘表虛而外越與衛氣相爭致令營衛失其常度得桂枝諸症蜂起者非桂枝之過乃伏邪化熱直貫陽明液耗陰傷而禍亂起於蕭牆之內有神昏如醉陰枯發痙之慮故仲景有急下存津之旨暫以吳氏達原飲觀其進退達原飲加生薑昨進達原飲舌後之苔轉黃身熱不從汗解溲赤而渾便溏色絳竟夜不寐神煩譫語心下拒按脈來滑數腑濁雖行液耗陰傷可慮原方加減前方加枳實桔梗兩進達原飲登圊五次醬黑之色漸淡溲轉渾黃胸次漸開夜得少寐身熱減自汗收腑濁既行議下從緩依方進步達原飲加生地汁歸身昨藥後熟寐通宵寅初忽覺憎寒須臾寒戰如瘧引被自履遍身悉冷四肢厥逆脈細如絲神情蕭索卯正遍身灼熱屏去衣被躁擾不安欲起者再忽然大汗淋漓始自頭項下溉周身汗到之處灼熱遂除如湯沃雪食傾脈靜身涼神清氣爽諸症若失此非轉瘧乃戰汗也得戰汗者以其人本虛內伏之邪既從腑氣宣通而潰則在經之邪孤懸難守不攻自散仍從表解外與正爭邪正交爭則戰邪退正復則已正氣不支是以發戰宜安神養營大生地八錢獨枝歸身三錢酸棗仁三錢白桔梗一錢木茯苓三錢白芍藥二錢炙遠志一錢上陳皮一錢炙甘草五分諸症悉退溲色猶渾知飢不欲食黃苔未盡腐中胃未醒餘氣未盡尚宜養胃生陰歸芍二陳湯加生地炒穀芽六和曲養胃生陰以安神志三陰煎去人參加金釵汁茯神廣皮蘆根三進養胃生陰以安神志之品知飢欲食二便如常惟夜臥不安虛里穴動心腎不交五液真陰未復六味歸脾加減案潛伏夾脊之內橫連膜原去少陰尚近離陽明不遠故溲渾而赤神煩不寐身熱汗自出不惡寒而微渴顯系邪氣先從內出之於外也所服之方多從表解延今念三朝身熱轉為潮熱如癉瘧之狀反無汗大便易色如漆中有血塊䐃肉全消筋脈動惕苔剝唇裂神昏如醉伏熱稽留無由以泄奪血無汗奪汗無血表液已枯里血復竭邪正兩亡殊難奏捷勉擬一方質諸明哲犀地湯加桃仁牛膝歸身甘草蘆筍案達原飲達膜原之邪沖和湯開太陽之表大汗淋漓衣被俱濕身反大熱消渴引飲舌苔根黃尖絳中央白而不潤溲渾赤便不解脈長洪而數復邪中潰鬱熱暴伸散漫經中不傳胃腑欲作戰汗宜人參白虎湯人參白虎湯案過經不解便溏色絳苔淡黃溲渾赤熱潮寅卯指時而發伏邪尚在少陽經也北柴胡根一錢赤芍藥二錢玉桔梗一錢炙甘草五分麩炒枳實一錢赤茯苓三錢淡黃芩一錢五分大地慄六個案伏邪盤踞膜原內與陰爭則寒外與陽爭則熱寒熱往來熱多寒少溲赤而渾便溏色絳虛煩少寐汗出如漿臟陰營液俱傷伏熱邪氣猖獗正氣不支難以直折避其來銳暫以小柴陷胸從乎中治小柴胡湯和小陷胸湯小柴胡湯手少陽之樞小陷胸湯抑縱橫之熱服後熟寐移時大便遷延而解從初更至平旦共六次俱如敗醬溲頻數渾赤之色漸清寒熱往來熱勢減半濈然汗出遍體涼和數脈已緩黃苔立腐伏邪中潰表裡分傳正復不能容邪餘氣散漫擊其惰歸宜開鬼門潔淨腑春柴胡一錢飛滑石三錢甘草梢八分淡黃芩一錢五分秋桔梗一錢赤豬苓各二錢炒枳實一錢福澤瀉二錢第八日寒熱如瘧一日數發苔白溲紅虛損少寐旦慧夕加晝輕夜重經水適來熱入血室殊難調治不可汗不可吐不可下不可溫不可補且不可和姑擬小柴胡加味從少陽開乙木帥中正之氣入氣街導營熱歸膀胱庶不犯中或用犀地湯近於是也小柴胡湯去薑棗加生地丹皮當歸白芍紅花青蒿鱉甲茯苓澤瀉案病經念八口禁不語身臥如塑溲渾如柏汁便解如豬膚脈空弦無力肉全消皮膚甲錯舌卷目上視心下熱熾手伏邪深陷厥陰液脫陰枯已著攻之不可補之不及兩無生理勉擬黃龍湯取攻補兼施之意以副百一之望上人參一錢次生地四錢白歸身三錢炙甘草五分箱大黃四錢炒枳實一錢昨服黃龍湯燥屎仍不下溲渾赤如故口禁不能言身強直形消脈奪目眩然不瞑舌翹而不下液脫陰亡髓熱發痙化源已絕無復資生神機已息枯魄獨存雖扁倉復起烏能措其手足仍以原方再服一帖八痎瘧案瘧邪之後留熱未除先天固不足後天亦不振腎為先天脾為後天脾腎不足以化精微釀生濕熱濕遏發黃五液不充熱留陰分致生潮熱陽明氣至則齧齒腎虛肝熱則抽搐脈來滑數無神滋少陰理陽明化濕濁清留熱順其性以調之香青蒿二錢細木通一錢川黃柏一錢粉草梢一錢炙鱉甲三錢鮮石斛三錢赤茯苓三錢陳廣皮一錢大生地四錢案五內素虛七情交併結聚痰涎與衛氣邪氣相搏發為痎瘧六君子湯加柴胡根蛀青皮案夏傷於暑秋必痎瘧間二日而作謂之痎寒熱相停溲渾而赤汗出濡衣胸次不暢陽邪陷入三陰脾傷少運胃有痰飲逢期腰痠腹痛總屬腎胃不和先以小柴瀉心加減小柴胡湯加歸身小柴瀉心加減共服十有二帖痎勢十去八九當期似有如無口乾微渴小溲頻數黃而不渾脈象尚帶微弦目眥黃侵白眼濕運餘熱未清經以疾走汗出於腎奔馳多汗氣喘耳鳴左疝大如鵝卵鼻中常流清涕乃素來本症腎肺不足可知平補三陰為丸緩治制首烏八兩大生地八兩白歸身三兩白茯苓三兩煅牡蠣五兩紋黨參一兩炙甘草五錢新會皮一兩炙鱉甲五兩淮山藥四兩水丸痎瘧固屬三陰期在子午卯酉少陰病也服補陰益氣以來痎邪已去尚有微意者正氣未充也素多思慮勞心爰擬黑歸脾加減黑歸脾湯去耆桂圓加製半夏薑棗痎瘧日久三陰交損土德不厚濕居中州致發陰黃色如秋葉食減便溏形神慵倦培補腎陰兼養心脾大生地四錢野白朮五錢上黨參一錢白茯苓三錢鮮首烏四錢益智仁一錢青蒿珠一錢建澤瀉一錢五分進補腎陰養心脾陰黃已退飲食頗增二便如常脈神形色俱起既獲效機依方進步大生地四錢青蒿梗二錢草豆蔻五分淮山藥二錢西黨參一錢炙鱉甲二錢烏梅肉一個雲茯苓三錢案三陰痎瘧寒熱俱重已經八次發於深秋溲清脈軟邪伏太陰極難奏效歸芍異功散加炮附子炮生薑經以夏傷於暑秋必痎瘧間二日一發之老瘧也起於客秋延今不已脈來遲緩寒重熱輕精神疲倦脾腎雙虧未宜止截擬進東垣法補中益氣湯去耆加茯苓薑棗案痎瘧半載熱甚寒輕戌正始來亥卯方退病在少陰熱而口渴陰傷可知衰年可慮六味地黃丸加柴胡案瘧經兩月有餘屢經汗散轉為潮熱指時而發陰傷五液受虧陽明有餘少陰不足熱入於營非癉瘧可比溲色清澄是其明驗法當靜補三陰六味地黃丸去山芋加麥冬歸身牛膝青蒿梗炙鱉甲案脈來軟數無力證本臟陰有虧瘧後中土受傷怒郁肝陽苦逆土不載木肝病傳脾陰不配陽水不濟火乃見竟夜無眠食少無味體倦神疲虛陽上越等症前進交通心腎熟寐連宵總服壯水之主形神復振曾患血崩素多抑鬱肝木久失條舒木鬱化火耗液傷陰以故氣從脅肋上升貫膈沖咽環臍作脹仍以壯水濟火為主崇土安木輔之六味地黃丸去山芋歸脾湯去黃耆桂圓肉木香水疊丸九痢疾案腸癖赤白氣血俱傷後重腹疼溲赤脈數暑滯俱重河間云溲而便膿血氣行而血自止行血則便自愈調氣則後重除宜芍藥湯芍藥湯案因熱貪涼人情之常過食生冷脾胃受傷值大火流西新涼得令寒濕得以犯中下傳於腎致成腸癖溲色清澄是其明驗脈來緩弱溫中為主平胃散加藿香木香炮薑赤豬苓案經言食飲有節起居有常飲食不節起居不時脾胃受傷則上升清華之氣反從下降而成飧泄久則戊邪傳癸發生腸癖延綿不已變態多歧下血或多或少鮮瘀不一此血不歸經氣失統攝下時裡急後重脾陽腎水俱傷下後魄門瘙癢中虛逼腸於下臍旁動氣有形或左右上下殆越人所謂動氣之狀腹脅脹墜不為便減土困於中魄門鎖束小溲不利水虧於下均非熱象矢氣欲解不解則肛門脹墜時或燥熱直逼前陰腎囊收縮氣隨上逆皆水虧土弱之徵小腹墜大腹膨矢氣解則舒不解則脹連脅肋右勝於左以脾用在右脾病故得矢氣則快然如衰常覺中下焦痞塞大便有時暢下則諸證較減以腎居於下為胃之關開竅於二陰大便既暢土鬱暫宣水源暫暢故減至於或為之症猶浮雲之過太虛也致病必求其本法當脾腎雙培偏寒偏熱恐致偏害歸脾湯去桂圓四物湯加鹿膠龜膠烏梅石榴皮炙升麻罌粟殼煨肉果溶膠為丸二氣素虛七情不節致傷脾胃傳化失常清不能升濁不由降清氣在下則生飧泄戊邪傳癸轉為腸癖色白如膿日十餘次下時裡急後重脾陽腎水潛傷舌苔色常黧黑中寒格陽於上腹中隱痛癖久剝及腸胃脂膏食減神疲夜多噩夢腎不交心而中虛氣餒因循怠治希冀自瘥病情轉劇將近一載前進補中益氣歸脾六君等湯以行升降之令總服胃關煎四神丸五味子散溫固三陰病勢退而復進脈體和而又否病勢若深殊難奏捷免擬溫固命門引火歸窟冀其丹田暖則火就燥下元固則氣歸精然否質諸高明真人養臟湯去肉桂桃花湯去粳米加煅龍骨熟地黃耆酸榴皮煨草果砂仁五味山藥桂圓川蓽茇吳茱萸補骨脂鹽水炒水丸痢成休息本是纏綿氣傷則白血傷則赤痢下純紅血分受傷起自客冬暮春未已大和中土培補腎關共服十有六帖痢勢十減六七第尊年胃氣易傷飲食頗減宜停煎劑以丸緩圖大熟地二兩遼五味二兩炙升麻五錢上廣皮五錢黨人參一兩淮山藥四兩赤石脂三兩煨木香五錢炙甘草八錢地榆六兩煎水疊丸十霍亂客忤霍亂內有所傷傷其七情外有所感感於六氣陰陽乖錯吐瀉交作吐則傷陽傷胃瀉則傷陰傷腎吐瀉時幸服理中得有轉機今經念日胸次脹滿口乾非渴脈弦無力陽不生陰陰不化氣陰陽俱虧五液俱耗乙癸同源是理第腎陰不足以制肝陽肝志為怒怒則氣上氣填胸膈非食滯可比肝無補法補腎即所以補肝人身之陰陽陽則親上而外衛陰則親下而內營難成而易虧補之非易無陽則陰無以生無陰則陽無以化必得益氣生陰陰從陽化腎氣通於胃陰精上蒸清陽開展自入佳境二氣兩協其平上下互相流貫自無否象公議生脈八味益火之源壯水之主從陰引陽從陽引陰是否備政名哲參脈散陽八味地黃丸肝脈漸和胃脈尚軟夜來半寤半寐二氣漸有和順之機素本腎虧虛寒之體真陽不健值大病之後二氣交傷五液互損臟腑之氣何由驟復補陰之品無過地黃但守補則中樞易鈍得桂附走而不守達腎火之窟蘊生中土方能化液生陰不獨不悶不滯且於腎胃有潛襄之功所謂補腎則胃開補命門則脾健清晨用原方略為加減培補腎命之陰陽午後以養胃生陰之品陰陽交濟之法循理之至似無背謬是否備政之於通明桂附地黃丸加黨參麥冬蓯蓉橘皮養胃生陰方空沙參八錢野白朮三錢大白芍三錢生甘草五分鮮石斛五錢夜寐初醒偶慮事情擾動心火舌中作燥原方加減午後仍服養胃生陰方六味地黃丸加參鬚麥冬製附子蓯蓉酸棗仁新會皮立秋後四日脈神形色俱起脾胃漸蘇大病新瘥臟腑初和二氣未定全在靜養工夫當守搖精勞形之戒澄心息慮恬淡虛無乃善後之良謀五內得太和之氣自臻康豫擬方仍候酌大熟地八錢淮山藥四錢五味子一錢白茯苓三錢上黨參一錢山茱萸四錢酸棗仁三錢化橘紅一錢白歸身三錢大病新瘥臟腑初和脾胃蘇而未振不宜思慮煩勞七情之傷雖有五臟之傷不外心腎天地造化之理無非靜定靜則神藏無為自化陰平陽秘精神乃治食入於陰長氣於陽陽氣者若天與日失其所則折壽而不彰故天運當以日光明前以從陰引陽從陽引陰水升火降諸症悉平茲擬黑歸脾加減從心脾腎主治待中樞大展飲食加增再以斑龍丸培補命腎之元陽以化素體之沉寒痼冷乃有層次治之當否仍候酌黑歸脾湯去耆加山藥山芋水丸十一沙蜮案客忤沙氣揮霍撩亂吐瀉交作三焦俱傷身冷脈伏柔汗不收目赤如鴆溲紅如血渾如中毒危在須臾勉擬元戎法盡其心力潞黨參二錢冬白朮三錢炙甘草五分紅蓼老梗一兩煅石膏一兩炮薑炭五分地漿水煎案沙氣襲絡遍身苛痹肢尖逆冷胸喉氣不展舒六脈細澀無力擬正氣六和加減藿香梗二錢大腹皮一錢炙甘草五分鮮木瓜一錢老蘇梗一錢新會皮一錢白茯苓三錢荊芥穗一錢川厚朴八分製半夏一錢五分案煩悶欲吐巔痛肢尖冷脈細澀沙候也法制半夏四錢活水蘆根二兩甘瀾水煎
