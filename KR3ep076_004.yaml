body:
  text: 副卷二一痰飲案九峰素有水飲因幼年嗜茶傷中耗氣從此忌茶四十餘年見茶即清水上泛初服苓桂術甘而效再發不應服六君而愈再發又不應進參附理中而效後亦不應吃千金鯉魚湯而愈再發無效吃鯉魚米粉粥而愈至花甲後雖發亦輕竟能吃西瓜水果螃蟹等物而茶終不能吃見茶則清水上泛究其理茶動濕而浸淫入脾胃耗氣也案素有遺精入房易泄火升耳鳴痰濕閉塞補藥不效至三十六載吟誦勞碌疫病轉染形體消瘦服人乳蘊熱於中胸次按之汩汩有聲氣息咽喉不利飲食不思脈象沉弦且數且滑沉者郁也氣也數者火也熱也滑者痰也濕也水也腎陰虧則精不藏肝陽強則精不固香燥難投膩補不宜從心肝腎進步兼調脾胃多訪名哲斟酌西黨參二錢焦於術二錢云茯神二錢廣橘紅核各一錢野料豆四錢枳實炭一錢當道子一錢炙遠志一錢冬瓜子寒熱各半一錢五分案肝鬱中傷胃寒積飲肚口汩汩有聲或脹至腿足或脹至巔頂不知飢餓肺氣不展肝脾不和六君子湯去甘草加桂枝蔻仁當歸桑白皮蘇梗枇杷葉薑渣案脈來弦滑無力腎虛真陽不旺脾虛健運失常虛寒積飲清濁混淆賁音腹脹懊憹嘈雜口流清涎臂肋疼痛橫逆左乳下胸次寒凝腎肝不納虛寒鬱氣四君子湯加桂枝半夏牡蠣薑皮案脈來沉弦而滑肝鬱中傷積飲吐酸痰如蛋清已延兩月肺腎俱傷食不能入入則痛甚兩脅作脹肝氣犯胃又值春令非所宜也桂枝尖雲茯苓焦白朮生甘草南木香訶子肉早服濟生腎氣丸案寒涼客犯肋脹攻痛嘔吐清水今已三月中寒積飲六君子湯加肉桂乾薑川根朴神麯四帖後加炒枳實臺烏藥服後去川朴加砂仁穀芽香附案脘中疼痛嘔吐黑酸水大便乾結中脘按之汩汩有聲延今載余飲食不香近日中脘申酉時微痛次日天明方止積寒生飲太陰陽明俱傷香砂四君子湯加元金散案右脈沉弦左脈沉滑肝氣內郁內有痰飲痛吐清水手足發冷肝腎雖虛從乎中治補中益氣湯加半夏茯苓薑炭案右脈滑疾左脈細澀肝腎內虧酒濕傷中積飲釀熱食後飽脹氣結嘈雜嘔惡清水久非所宜半夏瀉心湯加甘蔗汁案脈見弦滑肝脾氣脹胃氣積飲濕熱為患病延已久脾腎亦虛防其氣逆上衝陽八味地黃丸合二妙散加當道子冬瓜子服二妙陽八味肝脾氣脹已好喉中作脹頭痛耳鳴乃氣火上升濕熱為患六味地黃丸加檀香牡蠣薏苡仁案脈弦兼滑中陽不健胃寒停飲噯氣吐酸食後尤甚胸悶膈上停痰積飲為患苓桂術甘不應薑朮亦不應年在沖齡病延已久補命腎以建中陽擬以腎氣法調之金匱腎氣丸加沉香案左脈沉弦右脈沉滑噯逆吐酸胸悶嘔食腎虛胃關不建脾虛健運失常積痰積飲作酸作嘔外飲治脾內飲治腎六君子湯去甘草加炒枳殼每日服金匱腎氣丸外飲治脾內飲治腎腰痛眩暈晨吐白沫微有寒熱咳吐酸水心內疼痛服腎氣已輕原方加減陽八味地黃丸加半夏沉香案脈來細澀肝氣逆來犯胃中傷胃不下降不飢不納積飲吐酸厥逆之氣自下而上中宮之氣憊矣六味地黃丸加肉桂霞天曲益智仁伽南香益火之源以消陰翳服後雖平但氣機不利以原方加味前方加陳皮案兩脈俱弦且滑且疾思慮傷脾積勞傷中中傷停飲嘔吐清水氣不開暢發甚脹痛不耐操勞已歷十餘載病起於肝損及於中吐水多甜脾濕生熱腎為水之本膀胱為水之標土乃水之堤防崇土滲濕肝病實脾半夏茯苓湯加豬苓白朮黨參澤瀉早服濟生腎氣丸六進前方氣漸平順嘔吐未發亦未痛脹脈之弦滑稍平仍崇土滲濕佐以和肝六君子湯加澤瀉枳實冬瓜子省頭草午後服資生丸丸方溫膽湯加霞天曲黨參冬朮薑渣棗肉和丸案脈來弦滑中陽不健肝胃不和積寒積飲吐食吐酸間有苦水木鬱中傷曲直作酸木鬱達之本以苓桂術甘現舌苔焦黃胸中有熱先擬左金合二陳加味左金丸合二陳湯加淡乾薑昨進苦泄辛開服後心中發熱口有氣味昨夜魂夢不定如驚懼之象積寒化熱肝膽不平仍以瀉心溫膽法瀉心湯合溫膽湯連日胃口不佳肌膚覺熱陽明不和濕熱發動原方出入主之半夏瀉心湯去黃芩甘草加赤苓橘紅苡仁車前子採云曲穀芽服藥雖愈濕熱未化飲邪未清胃口不佳以丸緩治上防黨製半夏薑汁炒雲茯苓上陳皮川黃柏馬料豆炒枳實穀芽川雅連薑汁炒於潛術薏苡仁淡菜六和曲石膏湯為丸案恙因肝邪橫逆木來侮土土受木克以致飲食入胃雖然運化生津生液者少為火為痰者多細思病情似乎諸飲成痰之狀所服六君金匱資生皆肝腎脾之要藥理宜漸減方佳服此藥之後反覺有橫逆痰飲之象又兼肢冷脈伏嘔吐痰涎非高年久病所宜若論痰飲服六君理應見功若論腎虛肝氣服桂附亦未有效此棘手之症也暫擬人參代赭石湯加減用之服四帖後再為酌方可也所云脈閉肢冷皆痰飲阻塞胸中故爾陽氣宣通脈閉肢寒自愈旋覆花上人參製半夏杭白芍代赭石禹餘糧新會皮雲茯苓二痰症恙由勞傷心神痰入心竅漸入包絡以致厥逆昏沉頓傾方醒痰厥症也治宜育神化痰製半夏石菖蒲酸棗仁花麥冬上廣皮朱茯神炙遠志生甘草次加川鬱金枯礬水炒三反胃案腎虛中陽不建脾虛運化失常食入停中不運朝食暮吐午後脘痛氣響轉矢氣可稍舒晝夜如是七情鬱結思慮尤甚補中益氣雖好不若歸脾兼養心脾早服金匱腎氣丸服腎氣丸尚合機宜經云憂愁恐懼則傷心思慮勞倦則傷脾脾主中州養心脾是其法則歸脾湯加冬瓜子案納食主胃胃陽不足則不思食胃陰不足則不納食陽賴腎火以煦和陰賴腎水以濡潤納食思食運食皆真氣周匝素本火旺陰虧木火時升肺陰不降常多鼻流清涕喉痛所服補中益氣木鬱達之火鬱發之脾升胃降則健可謂詳而盡矣年逾古稀二氣皆屬不足雖有虛邪亦當固本大熟地白茯苓福澤瀉焦白朮黨人參白山藥蛀青皮枳實炭廣木香秋桔梗每早服枳朮丸木病春旺土困木克不納不運肝脾兩傷胃氣不蘇素來嗜飲濕甚中虛氣血不生化源日少源頭不來生氣必敗諸病叢生難以杜患虛不受補裡氣日衰擬養心脾暗和肝胃歸脾湯加茯神四厄逆案胃失沖和氣逆作厄溫膽湯加刀豆子案氣痰厄逆脈象弦滑而數按之無力中虛胃不和肺氣不降痰鬱作厄丁香柿蒂人參甘溫之品皆是厄由暴起所謂肺胃不和是也擬二陳湯合杏仁枇杷葉一治肺一治胃明日再進三劑可也二陳湯加杏仁泥枇杷葉次加刀豆子三生四熟服二帖五膈症案右脈弦大左象澀小中宮失運胃不沖和氣痰阻食年近七旬肺胃液枯八仙長壽是理現氣痛阻逆膩滯難投暫宜宣劑生脈散二陳湯加枇杷葉紅糖雪羹湯煎案氣鬱動肝中傷氣逆食入作痛噯氣不止脈象沉弦中州失運非佳候也擬補中益氣加味補中益氣湯加白芍五味海蜇赤砂糖三進補中益氣痛逆平平氣鬱傷肝中州失運四君子湯加白芍江枳實木香紅糖雪羹湯丸方歸芍異功散加枳實香櫞花川鬱金蜜丸案食入作噎氣痰作阻前後心痛已延三載有餘現粥已難下三陽結為之膈擬補陰益氣加味補陰益氣煎加遼五味枇杷葉恙原已載前方進補陰益氣噎阻雖開仍防旋閉既有效機原法出入前方去黨參加枳實花麥冬服藥關津已利前後心痛亦愈以丸代煎以免復萌補陰益氣煎加孩兒參半夏粉炒枳實北五味枇杷葉荸薺粉紅糖為丸案脈來沉小心肝腎三陰不足左脈犯弦木製中胃清氣不展濁陰上潛清濁混淆天地不泰變生否象不可輕視補陰益氣煎去黨參加五味蘇梗枇杷葉脈來沉小而澀肝腎陰虧左脈仍弦木製中胃氣失沖和天地不泰否象生矣不獨香燥難投破氣更屬不利養肝腎以納氣機養肺胃以舒氣化是否候酌八仙長壽丹加蘇梗枇杷葉生蜜陰虧於下火炎於上肺胃枯稿氣痰阻塞操勞內傷火升莫制液化為痰氣化為火腎水不升肺陰不降乃逆候也八仙長壽丹加枇杷葉案先天薄弱水不養肝肝虛犯胃胃不沖和氣不下逮反逆於上所以食不能下脈象虛弦不宜香燥當以乙癸同源為是八仙長壽丹服二帖喉痛咳減氣逆亦平飲食尚未進納豁然素有氣痛亦是肝腎不和補水抑木清心養肺仍守原法八仙長壽丹加阿膠枇杷葉前方服後飲食加增不甚嘔逆大便不暢此陽明氣不和陰虧所致擬六味合二冬加味六味地黃丸加烏梅二冬膏為先案腎虛胃關不健氣逆中宮食入作阻水不養肝肝氣中胃兩脈俱弦舌絳苔燥痰多汗多陰陽不化香燥殊屬不宜擬十味溫膽加味十味溫膽湯去棗仁加遼五味服藥後食入不阻痰少汗多舌苔已潤養陰化燥暢和中胃已和機宜原方加減前方加花麥冬鮮地栗服煎藥以來痰少汗斂阻礙已開飲食較多十味溫膽大合機宜仍以上病治下納氣歸窟不致復阻方為吉兆以丸緩治金匱腎氣丸加北五味麥冬竹茹半夏粉用枇杷膏福橘膏煉蜜為丸案中宮失運胃失沖和氣痰阻噎食不能下且痛且悶吐出方定機關不利致有三陽結病之勢姑擬十味溫膽湯加味冀天相吉人而已十味溫膽湯加荸薺納食主胃運化主脾脾升則降胃降則和中宮失運氣痰作阻胃失沖和飲食難下年逾六旬大便結燥肺胃乾稿脈見雙弦木製中胃病勢深沉慮難奏捷十味溫膽湯每早服腎氣丸養肝補腎納氣歸元右脈弦大不平胃失沖和木犯中宮肝為剛臟非柔不和納食主胃胃降則和腎不吸胃胃關不健金匱腎氣養肝補腎納氣歸窟上病治下十味溫膽奠安中州未獲效機鄙見淺陋擬補中益氣加減多酌補中益氣湯去耆加甘蔗自然汁中宮失運肺胃氣機不利七情鬱結胃失沖和升降失常天地不泰否象見矣擬歸脾法歸脾湯去耆肺胃氣機不利會厭開合失常思慮鬱結必得怡悅開懷不致結痹為妙補陰益氣煎加五味子枇杷葉心胸已上部位最高清空之所如離照當空曠然無外天地不泰否象見矣歸脾補陰益氣寡效者肝鬱心不暢鬱結之病也必得慰以解憂喜以勝悲再擬上病下取法挽之桂附地黃丸加沉水香據述服陽八味一帖又服歸脾用參三帖俱覺平和耳鳴頭眩心虛減去一二分惟胸口不寬半夜間或心中煩躁午後口內作黏乃心胸胃脘不暢木不條達仍以暢心脾和肝胃現交夏至節令每劑可用老山人參五分歸脾湯用人參去黃耆加陳皮情志抑鬱氣勃於中胃不沖和氣痰作阻心腎交虧神志不藏寤不成寐神情恍惚七情不適之病怡悅開懷為妙北沙參清阿膠酸棗仁上廣皮花麥冬白茯神炙遠志甘草夜交藤合歡花案腎虛胃關不健飲食遲於運化中虛健運失常痰起中焦脈來弦大而數按之無力腎之陰虧肝之陽強犯中擾胃清濁混淆天地不泰致生否象胸滿頭眩夜來陽強夢多內熱四肢無力胸下臍上左右痞塊橫硬延年十載操勞煩心太甚心肝腎三陰皆虧香燥難投謹防氣痰作阻法宜乙癸同源十味溫膽湯去竹茹棗仁加雪羹湯每早服八仙長壽丹案左脈沉弦肝鬱中傷右脈沉滑氣逆痰阻中宮失運胃不沖和年逾六旬五液先虧防成關格六君子湯加炒枳殼麥冬竹茹薑渣枇杷葉刀豆子三生四熟案思慮傷脾鬱怒傷肝肝胃不和飲食減少中宮不暢懊憹作痛病已多年脈象雙弦弦者為減殊屬不宜肝鬱達之火鬱發之擬東垣補中益氣法調中養胃不致三陽結病為吉補中益氣湯去黃耆加檀香白芍赤砂糖案脈來沉滑氣痰作阻胸次不開噫逆不爽慎防堵塞舒肺胃以展氣化不致病結則吉補陰益氣煎加竹二青枇杷葉案中宮失運氣痰交阻食不能下關津不順乃老年之逆症姑擬一方以救之生脈散加半夏訶子肉阿膠荸薺白蜜薑汁中宮失運氣痰阻塞胃失沖和關津不利難以奏捷溫膽湯加黨參麥冬枇杷葉左脈弦右脈結情懷抑鬱氣勃於中五志過極皆從火化木鬱達之必得抑鬱開懷心肝得太和之氣自臻安吉否則防其結痹補陰益氣煎加檀香開上實下輕舒肺氣胸次漸開天地交泰否象自除從心脾進步候脈無結象再為易方黑歸脾湯加檀香中宮失運氣失沖和痰逆氣阻食不能下太陰陽明機關不利非高年所宜補陰益氣煎加檀香案喉者候氣也咽者咽物也開合之樞機出入之門戶會厭失常阻逆飲食肺胃乾稿機關不利極難奏捷擬上病下取法多酌八仙長壽丹加附子甘蔗汁雪羹煎案年近花甲形瘦液枯肺胃乾稿機關不利氣化為火液化為痰食不能下膈症已成難於救治勉擬附都加味以盡人力附都氣丸加枇杷葉川白蜜半夏粉脈來沉小氣脹拱痛汩汩有聲二便皆不通暢前哲以溲便不利謂之關飲食不下謂之格陰陽偏勝病之逆從也知柏地黃丸加火麻仁郁李仁冬瓜子冬葵子當道子案年逾六旬操勞煩心中胃不和食入痛阻機關不利兩脈俱弦木犯中胃殊屬不宜所服之方甚好仿以為治杭白芍三錢上廣皮一錢白茯苓三錢赤砂糖二錢訶子肉二錢烏梅肉一個生甘草五分雪羹湯代水案暴怒傷陰酒後飲冷氣火鬱結肺胃不降大渴引飲已延一月心慌手抖茶水不入大便結如羊糞小溲全無嘔之不出納之不下已變關格難以救藥姑擬溫膽湯加味候酌溫膽湯加黨參黃芩五味乾薑甘蔗汁昨服藥後煩嘔已平大便行而未暢原方加減原方去竹茹分量略增煩嘔雖平氣痰未下陽明不和腑氣不調仍屬逆候擬瀉心溫膽宣暢陽明半夏瀉心湯溫膽湯加生薑荸薺蔗漿嘔吐已好納食稍可小溲行便未解是無糟粕也半夏瀉心湯加粉甘葛炒枳實白茯苓生薑服藥後下結糞兩次納食不吐咽中仍干仍嘔白痰擬十味溫膽湯十味溫膽湯加麥冬杏仁泥納食不吐結糞已通小溲已行嘔惡已愈危症得安乃天幸也不可動怒亂食復蹈前轍前功盡棄須當慎之前方去麥冬納食已暢腑氣已通胸次已開肺胃陰虧喉內作干陰不化燥生熟地銀條參半夏粉地栗汁浸透枳實炭天麥冬金叉斛新會皮生甘草案始因消渴變為關格大醉引飲而起服溫膽瀉心吐止便通而納食多日矣現喉又作干夜來飲水四次胃陰不降仍以前法半夏瀉心湯加栝樓仁知母枳實茯苓甘蔗漿消渴之病本屬陰傷變為關格陰陽俱竭服藥後關格已通忽又幹渴氣不生陰陰不化氣仍屬危候生脈散二陳湯加竹二青枇杷葉消渴已減夜來安寐飲食如常舌後之苔尚未全清胃陰未復原方加味原方加鐵皮石斛經霜桑絡黑芝麻案氣火痰結肺胃陰虛會厭開合失常咽中不爽喉中作噎吞之不下吐之不出宜養陰化燥清氣化痰不宜動怒煩心八仙長壽丹加枇杷葉肺胃乾稿氣逆阻塞噯氣不舒乃中宮之逆候八仙長壽丹加枇杷葉雪羹煎諸氣膹郁皆屬於肺諸逆衝上皆屬於火氣阻逆食會厭開合失常情懷抑鬱氣勃於中生脈散二陳湯加枳實炭杏仁枇杷葉服藥五帖氣悶已好原方加減橘皮竹茹湯加枳實服藥以來氣悶已開噯逆已除以丸代煎調養息慮凝神不致反復方為佳兆大熟地半夏粉胡芡實光杏仁去皮尖孩兒參上廣皮白茯苓炙遠志去心炒枳殼枇杷葉紅糖為丸案恙因善飲過多火結肺胃以致妨礙阻塞食難入胃兼之隱隱作痛乃痛膈之狀也治宜和胃化痰為主大貝母肥玉竹淮牛膝白茯苓廣鬱金杭白芍大麥冬生甘草黑山梔廣橘紅六肝胃病案恙因痛在胃中中焦氣阻於肝肝氣攻衝於胃年近六旬氣分虛脾胃弱治宜定痛和中為主代赭石生甘草白茯苓白豆蔻後下吳茱萸杭白芍醋炒廣鬱金上陳皮制香附案肝氣不調攻衝作痛嘔吐酸水經云酸者肝之味又云木旺則土虛治宜調氣平肝暢中和胃二陳湯加杭白芍白蔻仁鬱金麥芽石斛桔梗案肝氣不調攻衝作脹恙因先天不足於前脾土有傷於後以致飲食入胃脹悶不舒經云胃司納脾司運木旺則土虛遂致脾曠其運和胃暢中固是一法而平肝調氣尤為先務川石斛青陳皮麥芽廣鬱金白蔻仁後下杭白芍雲茯苓案六脈往來調達氣分虛而肝脾不足恙因思慮傷神中焦失運肝氣橫逆木來侮土經云胃主納脾主運一納一運化生津液又兼胃中無火不能消穀命門火虛釜底無薪早進金匱腎氣晚服十九味資生此二方最穩然久患肝脾湯藥不宜多服況年高氣弱津液內耗溫燥之品亦不可多投宜滋肝調氣靜養怡情庶乎相合黨人參貢白芍黃鬱金干切茯苓淮山藥干石斛新會皮薏苡仁每日早服金匱腎氣丸晚服十九味資生丸七祟病陽明不足以勝幽潛花卉與妖登高山入古寺臥古冢名曰祟病虎腦骨三錢製半夏三錢茅山術一錢二分淡竹瀝三錢制南星一錢二分化橘紅一錢二分川根朴七分生薑汁三分粉甘草五分或加烏犀角五分脈數大加大古勇五分八健忘案腦為髓海王海藏云空則多忘神志不藏不能安舍舍空則痰火居之以致精損健忘大熟地法半夏酸棗仁生甘草大麥冬去心秫米炙遠志去心燈心草木茯苓神各廣橘紅未來之事取決於心已往之事記之於腎神志不藏痰火居之致成健忘之病前方去秫米燈心加芣苡子案心血不足包絡有痰謂之善忘養陰開竅和絡通靈枕中丹加味化心絡之痰非逐濕痰之品所能獲效孔聖枕中丹用龍齒加血琥珀麥冬當歸鬚案心不下交於腎腎不上交於心濁火亂其神明精氣伏而不用心脾受恙神志不寧健忘之由也肝藏魂腎藏志調攝心脾滋養肝腎青龍齒潞黨參天麥冬米炒杭白芍敗龜板酥炙大熟地砂仁炒當歸身酒洗淮山藥九菖蒲白茯神炒五味益智仁炙遠志酸棗仁炒大有耆九不寐案自汗不寐心腎兩虧汗為心液腎水不升心不下交多疑多慮心膽自怯法宜補坎填離以冀其水火既濟生熟地各四錢木茯神三錢酸棗仁三錢夜交藤四錢左牡蠣四錢阿膠珠二錢杭白芍二錢北小麥五錢服藥雖愈不能霍然脈來沉數腎不交心心陽上亢子午不交寤不成寐擬六味地黃丸加味六味地黃丸加熟棗仁阿膠雞子黃案脈來動滑按之則弦不知喜怒多疑多慮心膽自怯郁損心陰膽虛不寐驚則氣亂傷心恐則精怯傷腎膽為中正之官心為主宰腎為根本膽附肝之短葉下肝虛膽虛膽冷無眠膽虛亦無眠十味溫膽湯案思慮煩心心氣不能下達腎陰不能上潮虛煩不寐子午不交不宜煩勞川雅連大熟地西黨參雀腦芎杜阿膠肥知母棗仁炭粉甘草雞子黃枳實炭白茯神案傾接手書敬念尊夫人服藥後心內轉覺煩擾不寧草三日又服一帖精神略減飲食未進日日如是經所謂胃不和則臥不安難經云經有十二絡有十五餘三絡者陽蹻陰脾之大絡也凡經絡二十七氣相隨上下其蹻絡不拘於十二經絡陽蹻統諸陽絡陰蹻統諸陰絡越人云絡脈滿溢不能拘通譬之溝渠溢滿流注湖澤而不環周故十二經不能拘其蹻絡蹻絡亦不拘於十二經是以古無治奇經八脈之法亦未立方只有針刺八脈之法今厥氣客於臟腑衛氣獨留於陽行於陽則陽蹻盛不能入於陰則陰蹻虛故目不冥法用半夏秫米湯者以藥力不能直入陽蹻故治胃以泄胃氣也半夏辛溫入胃經氣分秫米甘酸入胃經血分乃北地之膏粱蘆栗是也用千里長流水揚之萬遍與甘瀾水同樣取其輕揚不助陰邪炊以葦薪武火也火沸入藥仍徐炊令減寓升降之法升以半夏入陽分通衛泄邪降以秫米入陰分通營補虛陰陽通臥立至汗自出故曰汗出則已矣半夏秫米湯用長流水煎揚之萬遍炊之以葦薪服之令汗出衛氣晝行於陽夜行於陰行陽則寤行陰則寐令吐瀉後寤而不寐嘔惡痰涎胃氣不和衛不行陰以內經半夏秫米湯半夏秫米湯服後安寐即佳徵也惟嘔惡未已胃氣虛痰不運原方佐以益氣前方加西黨參十三消案陰虛有二有陰中之火虛有陰中之水虛水火同居一窟腎臟主之陽不化氣水精四布水不得火有降無升直入膀胱飲一溲二名曰腎消經載不治擬方挽之多酌高明桂附八味丸加巴戟天肉蓯蓉鮮石斛石菖蒲遼五味花麥冬遠志筒案經以二陽結謂之消謂手足陽明與大腸經也胃為水穀之海大腸為傳送之官二經熱結則運化倍常傳送失度故善消水穀不為肌膚名曰消中誠危候也謹防疽發白虎湯去粳米加生地汁飛滑石麥冬牛膝川木通案善食而瘦名曰食㑊亦名消中熱結陽明胃府防其疽發擬調味承氣湯加減主治箱生軍八錢川黃柏二錢湖丹皮二錢白茯苓三錢川萆薢三錢肥知母三錢淮山藥四錢福澤瀉二錢大渴引飲舌裂唇焦火灼金傷津液枯涸能食脈軟此屬上消亦曰膈消謹防發背白虎加人參湯案善渴為上消屬肺善飢為中消屬胃飢渴交加肺胃俱病肺主上焦胃主中焦此由中焦胃火上炎上焦肺金失其清肅津液為之枯稿欲得外水相救故大渴引飲陽明主肌肉食多而瘦削日加乃水穀精華不歸正化故善食而瘦陽消症也經言亢則害承乃制擬白虎湯主之白虎湯案岐伯曰五氣消上溢轉為消渴名曰脾疸夫五味入口藏於胃脾為之行其津液在脾故令人口乾也此肥美之所發也肥者令人內熱甘者令人中滿故其氣上溢轉為消渴治之以蘭除陳氣也佩蘭葉鮮生地五味子川柏片白葵花東洋參天花粉知母肉緑升麻大麥冬生藕汁消渴已止眠食俱安痰嗽未平胸腹仍脹乃木火餘威木指金鳴火灼金傷故也曾經大産後經前作痛於茲七載八脈有虧現經閉二月有餘脈象細數無力非胎候也有虛勞之慮宜靜補真陰人參固本丸加白朮玄武版女貞子玉竹蜜丸案善渴為上消肺氣熱而故消也飲水過多中土受傷氣機不暢胸腹作脹噯氣不舒木火餘威擊金為咳去冬調治雖痊今春小發煎方暫停以丸緩圖八仙長壽丹去山芋加北沙參白朮橘皮蜜丸案脈來軟數無力證本陰液有虧五志過極俱從火化萬物遇火則消故飢嘈善食食不能多者三消未著也前哲治消症必先蕩滌積熱然後補陰否則火得補而愈熾服瀉心五帖火勢已殺宜補真陰知柏地黃丸去山芋加玄武版黑山梔蜜丸經言三陽結謂之消有上中下之別下消者小便如膏如淋渾濁者是也良由過用神思擾動五志之火銷鑠真陰精血脂膏津液假道膀胱尿管而出故小便如膏如淋五內失其榮養一身失其灌溉日消月爍殊為可慮擬兩儀加味以滋肺腎之源取金水相生之意第草木功能難與性情爭勝更宜屏除塵絆恬淡虛無俾太和之氣萃於一身自能勿藥有喜別直參四兩大生地十六兩羚羊角用片三兩淮牛膝四兩南沙參十二兩天麥冬各八兩白歸身六兩長流水熬膏十一頭痛案頭偏左痛巔頂浮腫痛甚流淚身半痠麻三陽行於首面厥少會於巔頂此屬虛陽上冒真陰下虧養肝腎之陰開巨陽之表西羌活一錢明天麻一錢五分老川芎八分赤茯苓三錢北防風一錢羚羊片八分湖丹皮一錢五分次生地四錢池菊花一錢白蒺藜去刺三錢福澤瀉一錢五分案頭痛巔疾過在足少陰巨陽補腎益氣雖是一法滋肝壯水尤為先務用仲景加減一陰煎治之大熟地大麥冬白山藥黑山梔鮮石斛杭白芍牡丹皮蔓荊子案陽明胃火上炎頭中震痛如動脈之狀時作時止脈洪而數寒以取之白虎湯加生地麥冬木通澤瀉案素本陽虛不時巔痛脈來細數容色蕭然陰翳上滯精明之府法當益火之源東洋參三錢淡乾薑五分冬白朮三錢炙甘草五分製附子五分案宿疾陰虧巔頂時痛面色戴陽脈來軟數浮陽上擾清空暫以壯水之主六味地黃丸去山芋加白歸身案脈來沉滑頭痛如破痛甚作嘔食入則吐胸滿脅脹濕痰盤踞中州清氣無由上達清虛之所名曰痰厥頭痛主以溫中消飲佐以風藥取之平胃散加北細辛蔓荊子川芎案頭痛兼眩不寐肢間逆冷心中憒憒如駕風雲此風痰上擾清竅有痰厥之慮擬半夏白朮天麻加減半夏白朮天麻湯去黃耆蒼朮加川芎蔓荊子怒損肝陰木鬱化火下耗腎水上熏巔頂值有妊三月奇脈亦受其戕少陰虛不能引巨陽腑氣則巔痛陽維為病苦寒熱擬逍遙散加味以條達肝邪治其寒熱巔痛之本逍遙散加川芎制香附案頭為諸陽之會病屬上實下虛上實為陽明有餘下虛乃少陰不足擬玉女煎加味玉女煎加川升麻十二胃脘痛案胃脘當心而痛痛則水瀉脈滑而弦舌有黃苔不思穀食胸悶不寬積濕化熱兼之停食食聚中胃作楚粉葛根元金散枳實炭赤茯苓川根朴南木香甜冬朮建澤瀉草果肉案胃脘當心而痛中陽不建陰維為病桂苓朮甘湯加薑棗湯案年甫念三胃病九載痛則嘔吐酸水脈象沉弦而滑中陽不建胃寒積飲擬苓桂術甘加味桂苓朮甘湯加熟半夏白蔻仁煨薑赤砂糖案胃脘當心而痛客秋得後心中頗似悲泣欲哭而不能舒氣悶而不能升曾服黃連藥二帖稍好現大痛不已痛時胸口至喉內熱如火炭喉內痰塞不利午後尤甚頭暈四肢無力精神倦怠飲食不香此肝氣犯胃土受木侮以苦降辛通法調之左金戊己本是先權以瀉心法服後再議半夏瀉心湯加鵝管茯苓案肝鬱氣痛痰多作嗽肺有伏風值秋燥令行自得其位烏足慮也杏蘇二陳湯加當歸白芍氣痛立止痰嗽未平咽痛似傷非喉痹也乃陰虛火燥肺有伏風仍以清開肺胃前方加蛤粉炒阿膠炒牛子案舊恙肝虛氣鬱作痛調治雖痊去冬因風襲肺絡痰嗽延今不已形神日羸飲食日增腹中汩汩有聲脈來細數無力中虛積飲伏於肺經乃虛勞之漸殊堪慮也二陳湯加黨參金沸草歸身薑棗痰嗽稍平脘痛復作按之則痛緩可按為虛也經以脾絡布於胸中肺脈還循胃口證本木旺中虛土不生金風邪伏肺氣機不展痛則不通不可拘痛無補法之説通則不痛通者宣和也非必通利也補亦可通也益水生木培土生金展氣化宣伏風主治歸芍六君子湯加熟地棗仁遠志阿膠霞天曲陳倉米水泛丸服丸徐治入冬以來脘痛時作時止痰嗽或減或增飲食較進細數之脈未起脾腎雙虧伏風未盡腎病當愈於冬自得其位而起不愈者以水旺於冬而冬水反涸其體因少生生之氣故也水冷金寒肺有伏風外風易感同氣相求也必使裡氣融合方可有濟暫從溫散小青龍湯去桂枝芍藥加熟地茯苓杏仁蘇梗當歸桔梗溫散伏風痰嗽競止脈仍細數脘痛依然暫以二陳加味以搜肺絡之餘風服三帖仍以甲子所擬丸方調治方未見乙丑五月診脈仍細數素本陰虧木不條達剋制中胃中傷絡損氣失沖和肝鬱則痛胃傷則嘔陽明之氣下行則順太陰之氣上升則和經以六經為川腸胃為海以通為主五六日更衣一次陰液不濡腸胃燥澀可知香燥開胃非所宜也擬以潤燥生陰佐和中胃大熟地四錢陳阿膠三錢淮牛膝三錢蘇橘紅一錢吉林參八分淡蓯蓉三錢當歸身三錢蜂蜜八錢潤燥生陰佐和中胃服後痛嘔俱平惟胸次不暢大便未解陽明傳送失職太陰治節不行皆緣陰液有虧也不必強行傷氣前方加味原方加郁李仁大便已解腑氣已通證本陰虧當緩治蓋陰無驟補之法仍以甲子所擬丸方調治逢節用人參五分煎湯送下丙寅二月診脈之細數如初飲食較前略進形神漸振痛吐之並作舉發漸稀證本肝陰不斂剋制中胃胃不沖和傳化失職津凝為飲液結成痰中虛清氣不展陰霾上翳否象呈與七方甘緩最為妥協服四五帖後仍服甲子擬丸方調治歸脾湯去黃耆桂圓加半夏陳皮薑棗肝陰不斂腎陰不滋健運失常中傷飲聚痛嘔並見屢發不瘳腎損傷於肺肝病傳於脾腎氣通於胃脾絡布於胸絡脈通調則不痛胃健氣強則無痰治病必求其本滋苗必灌其根若不培養真元徒以痛無補法印定呆法安望成功數載以來病勢退而復進脈體和而又否者病勢苦深而少靜定之力也蓋陰無驟補之法草木功能難與性情爭勝金為水母水出高原謹擬補腎生陰為主清金益肺輔之俾金水相生從虛則補母之法乃經旨化裁之妙非杜撰也六味地黃丸加天麥冬各白沙參肉蓯蓉霞天曲阿膠水丸逢節用人參五分煎湯下案肝氣逆胃痛嘔不能納穀歸芍二陳兩和肝胃歸芍二陳湯加薑棗案氣虛不能傳送液耗不能濡潤氣主煦之血主濡之腎司二陰胃司九竅腎水承製五火肺金運行諸氣二液不足濡潤肝陽木橫中傷轉輸失職血燥腸干故大便不解痛嘔不舒通夕不寐擬參麥散行肺金之治節治腎水之源流冀其清肅令行肝胃自治病不拘方因人而使運用之妙存乎一心公議如是敬呈鈞鑒生脈散加白蜂蜜昨進生脈散夜得少寐今仍痛嘔雖體氣素壯然病將三月之久脾胃已困肝木獨旺肝在聲為呼胃氣逾逆不能飲食轉輸愈鈍大便不行肝為剛臟非柔不和胃為倉廩非谷不養肝氣鬱極化火火灼陰液為痰痰凝氣結幻生實象非食積壅滯可下也公議生脈散加金匱大半夏湯生脈散加金匱大半夏湯痛嘔不止飲食不進大便不解夜來少寐總由水不涵木火灼液耗兩陽合明之氣未能合洽故上不入下不出中脘痛嘔不舒也此時惟宜壯水清金兩和肝胃木欲實金以平之肝欲急甘以緩之水能生木土能安木肝和則胃開納穀胃開則安寐便解此不治痛不通便而通便止痛之法在其中矣仍以生脈散金匱參蜜半夏湯合甘麥大棗湯生脈散參蜜半夏湯甘麥大棗湯加黃粟米甘瀾水煎腑氣雖通未暢臟氣未和痛尚未止總由肝氣橫逆夫肝屬木賴腎水以滋榮不思食者胃陽不展土受木克故也胃為陽土得陰始和究其原委皆緣平昔肝陽內熾耗損腎陰以致水虧於下莫能制火火性炎上與諸陽相率為患王道之法惟有壯水之主以制陽光俾水能涵木則肝自平胃自開痛自止矣生脈散合六味地黃丸木喜條達鬱則侮土性籍水涵涸則燥急心煩口燥母病及子胃氣由心陽而開肝木得腎陰而養中陽宜健運金冷宜清肅大便通大腸之氣已順痛嘔止陽明之氣已和惟是胃氣未開尚不思食乃痛久氣餒中傷胃不清和陰液未能遽復益氣生津俾二氣各守其鄉庶免變生他患參麥散合六味地黃丸淮牛膝案肝制中胃不能納穀大便復閉稽考各家並無成法擬韓氏醫通中或謂問大便不通暫服通劑可否曰病非傷寒痰證豈可下乎雖可取快於一時來日閉結更甚使陰虧於下陽結於上燥稿日甚三陽結病勢在必然經以北方黑色入通於腎開竅於二陰腎惡燥喜辛潤為五液之長陰液足則大便通暢陰液衰則大便燥結高年血燥陰虧每有是疾經言肝木太過令人善怒不及令人胸痛引背下則兩脅脹痛痛久傷氣氣傷陰虧火燥便結腸胃氣滯外擬實象內系枯燥所謂大虛似實虛極反見實象是也轉瞬木令司權中樞益困急宜養陰涵木子母相生俾春生之氣萃於一身自然勿藥有喜野山參一兩原熟地八兩雲茯苓三兩川牛膝三兩花麥冬三兩山茱萸四兩甘枸杞三兩歸身三兩遼五味一兩淮山藥四兩蜜水為丸案昔肥今瘦神倦食減胸痹作痛曲直作酸痰飲作嘔中虛木侮傳化失常治宜宣補東洋參三錢製半夏一錢五分炙甘草五分煨木香五分於白朮二錢青廣皮各一錢炮薑五分白蔻仁後下八分案中傷積飲食少運遲胸次作痛有妨飲食午後痛勢攻衝上下不定痛即嘔吐腎虛真陽不布升降失常益火之源以生中土方為求本治法金匱腎氣丸加沉水香蜜丸案木乘土位轉化失常清陽不升濁陰不降升降失司否而不泰脘痛如刺嘔吐痰涎不思飲食脈來軟數已歷多年正氣已虧殊難奏捷擬調氣法中加以輔正之品歸脾湯去黃耆桂圓加青陳皮草蔻仁白芍上沉香蜜丸案陰虛於下腎不養肝木乘土位健運失常不能化運精微二氣源流不暢痛則不通是以痛嘔不能納穀延今四載有餘春末夏初舉發今年發在冬時脘痛如刺嘔吐不食呻吟不絶幾致汗脫延綿四十餘日服藥嘔雖平飲食難進脈尚未起慮其來復以丸代煎徐徐培養油肉桂後下一兩高麗參四兩雲茯苓三兩上沉香一兩大生地八兩酸棗仁三兩白歸身四兩薑半夏三兩淮山藥四兩炙遠志二兩杭白芍三兩福橘皮二兩山芋肉四兩煨木香一兩蜜丸案病原前方申説第脘痛甚則怯寒肢尖面目不可以當風此屬氣閉不能敷榮四末上走清空非真寒也服理氣之劑佐以山梔清氣鬱之火痛勢雖愈嘔平食納數脈亦緩證本木乘土位中傷氣鬱化火傷陰不宜煩勞動怒肝病治脾前賢良法擬歸芍六君加減運中樞以暢清陽為主歸芍六君子湯去半夏加煨木香遠志蛀青皮省頭草沉香蜜丸案肝鬱乘脾中傷氣痛食飲少食入時吐脈來細數無神久延有虛勞之慮經以怒為肝志木鬱達之然草木功能難與情志爭勝使非戒怒終無濟也歸芍異功散加廣鬱金佩蘭梗蜜丸十三脅痛案脅痛本屬肝膽二經之脈皆循脅肋素本憂勞憂傷肺志勞動心陽心肺傷而肝膽郁法當宣補未可作東方氣實宜疏論治異功散加歸身遠志木香薑棗案肝膽氣滯不舒脅肋痛如錐刺宜濟川推氣飲濟川推氣飲加薑棗案肺郁傷肝木乘土位木性條達不揚則抑土德敦厚不運則壅氣道不宣中脘不快兩脅作痛香橘湯加薑棗案暴怒傷肝木火載血妄行清竅脅肋脹痛煩熱脈洪宜先瀉東方之實兼助中央之土以杜傳脾之患箱歸身三錢焦山梔一錢五分青廣皮各一錢雲茯苓三錢京赤芍二錢粉丹皮一錢五分象貝母二錢白朮炭一錢五分案脅痛多年屢發不已延今寒熱宜甚復用養血調氣等劑遍嘗無效第痛時一條扛起乃食積之徵也每日服保和丸案肝火內郁脅痛二便不爽大古勇一錢龍膽草一錢洋蘆薈一錢黑梔肉一錢五分吳茱萸四分全當歸三錢飛青黛一錢廣木香五分案肝藏諸經之血腎司五內之精緣少年嗜欲無窮損傷肝腎精血兩虧精虛不能化氣血虛無以涵肝氣血尤水源也虛則不能流暢凝滯不通以故胸脅作痛延綿不已虛痛奚疑法當培補精血治其治病之本不可泛服行氣通絡之品大營煎案肝膽之脈循於脅肋憂思過度致損心脾氣血不能流貫致令厥少二經不利心脈亦循胸出脅脾傷故木不安是以脅肋隱痛培補心脾治病之本黑歸脾湯去黃耆加柏子仁十四腰痛案腰者腎之府腰間空痛按之稍緩能直不能曲病在督脈也大熟地鹿角膠肥杜仲胡桃肉東洋參龜板膠當歸身青鹽補骨脂自然銅雲茯苓雄羊腰案腰為腎府痛屬腎虛腎與膀胱相表裡太陽之脈夾脊抵腰督帶衝任要會於此素耽酒色腎陰本虧恬不知養潛傷四脈時有痛作屢發不瘳展轉沉涸歲月彌深行立不支臥息稍緩暴痛為實久痛為虛在經屬府在臟屬腎擬方緩治鹿角膠高麗參淡蓯蓉淡秋石巴戟天補骨脂厚杜仲當歸身每晚服清娥丸案腰乃身中之大關節也腰痛屢發不瘳痛則傷胃腎乃胃之關關津不利皆緣腎胃兩虧氣血源流不暢目得血而能視足得血而能步血失其營養以故頭傾視深步履欹斜服健步虎潛等丸寡效胃氣不能敷布也擬六味二妙腎胃兼治以漸圖功高年慎防傾跌六味地黃丸合二妙散蜜丸十五腹痛案脾虛易感腹中作痛補中益氣湯案瘧後脾腎兩傷腹痛心慌神倦懶惰食後嘔惡酸水五更喉干作燒頭中一線作痛眼生黑花三陰不足陰濕蘊結致有腹痛之患陽八味地黃丸加青木香陳皮半夏煨薑案脈象沉弦氣鬱動肝肝沖氣脹已歷多年不耐煩勞大腹小腹脹痛形容憔悴血不榮色心脾營損肝氣橫逆養心脾以合肝胃歸脾湯加白芍陳皮進養心脾以和肝胃痛定神安容色漸轉既獲效機依法進步前方加肉桂腹痛已痊飲食已香夜來寐安脈神形色俱起不宜煩勞動怒原方損益黑歸脾湯加白芍案當臍疼痛痛則作脹作嘔已歷數載腎氣不和積寒為患桂附八味丸去地黃加木香沉香茴香桂水炒白芍紅糖每早服金匱腎氣丸案少腹脹痛拒按上攻胸脅便黑不爽溲赤而渾血蓄下焦已著昨進通瘀之劑脹痛反甚非藥不對症乃藥淺病深況病久正氣已虛無能斡旋藥力正治之法從緩暫以養營喧絡主之全當歸五錢明乳香一錢五分赤茯苓二錢淮牛膝二錢青陳皮各一錢沒藥一錢五分建澤瀉一錢五分瘀停少腹脹痛不舒火在二陽自汗不寐血為熱搏滯澀難行嘔吐心嘈二便不爽病延日久二氣交虧屢進扶正通瘀之劑證勢退而復進瘀血行而又止蓋血為熱搏乾澀於中有非氣復津回不能融化之勢今擬清輕之品以徹三陽之火待腸胃清利再議行瘀可也中生地四錢福澤瀉一錢五分淮牛膝二錢黑山梔一錢五分粉丹皮一錢五分雲茯苓一錢五分車前子二錢全當歸三錢兩進清輕徹火之劑諸症俱減少腹脹痛依然心下反竟不快按之則痛時嘔痰涎此恙久脾胃兩傷轉輸失職不能運化精微以故中央不快脾傷不能為胃行其津液凝滯成痰作嘔胃虛不能斡旋藥力流暢諸經停瘀不散作痛欲培脾胃守補之劑非宜欲散停瘀胃弱不勝攻劑暫以通徹陽明主治二陳湯加生地孩兒參歸身棗仁遠志十六積聚據來恙源細參一切始原遍身發冷出汗不止服真武加減未效後便血臍左右有硬積二塊頭暈夜煩兩脅心腹作脹筋骨疼痛不舒肝主筋脾主四肢陰液本虧陽明郁痰悶結氣積凝而成塊連服溫膽小效後服下劑更兼礞石丸據云症勢已減六七惟硬積跳動不消此症雖在肝脾總由腎之水虧肝之陽強陰液不充是以氣積不化素問云陽在外為陰之使陰在內為陽之守氣行血流如風行水動也仲景謂養正而積自除正充而塊自解攻乏之劑不過一時恐未能豁然擬養正消積固氣和陰久服可效但不知脈象何如耳制首烏延胡索春柴胡半夏曲明黨參肥牛膝杭白芍建橘紅茜草根蓬莪朮全當歸黃鬱金上丹參大生地淮山藥白茯苓十七鼓脹厥陰肝氣勢結太陰脾濕不宣胸悶腹脹而大並有積塊中滿之症慮其食減脹喘生變多酌野於術土炒一錢五分霞天曲一錢五分雞內金一錢五分水紅花子二錢沙枳殼麩炒一錢二分雲茯苓三錢上沉香五分陳香櫞皮五分縮砂仁後下一錢五分服兩劑加制香附一錢五分乾蟾皮一錢五分尉腹法官桂三錢香附米五錢制沒藥三錢枳實五錢豬牙皂三錢香櫞皮五錢水紅花子四錢共搗末蔥汁米醋燒酒敷勻臍上旁以面圍之燒熱鞋底尉藥上並治積聚十八蟲症案蟲以濕土為窠穴治脾燥濕以化之乃治蟲通套法也然有五臟之別形狀之異寸白與扁蟲不同寸白無妨扁蟲類螞蝗能大能小嘴尖尾禿接續可長數寸與寸白異害人甚速惟養腎氣先杜布子之患大熟地八錢製附子八分川黃柏一錢雲茯苓二錢野黃精五錢烘白朮二錢烏梅肉三個淨黃土一兩川楝子二錢棐子肉一兩萹蓄二錢每早服黑錫灰丸三錢案臟氣實者蟲無以生蟲生必臟氣虛也證本腎虛於下木失敷榮木乘土位脾困於中蘊生濕熱化生蛔蟲蟲蝕脂膏痛如錐刺時作時止脈反浮洪痛甚頰青唇赤是蟲之驗也治宜固腎扶脾為主追蟲滲濕助之大生地四兩使君子三兩淮山藥三兩雲茯苓一兩五錢東洋參三兩生木香五錢當歸身二兩冬白朮三兩白蕪荑一兩五錢川黃柏一兩川椒目三錢荔枝核一兩上藥水丸案腎屬水虛則熱膽移熱於腦則辛頞鼻淵涕冷而腥痰多思睡起自去秋屢下寸白蟲此肝腎兩虧六味地黃丸加黃精萹蓄棐子肉病原載前方腦漏鼻淵六腑之病俯首即暈痰多思睡飲食作飽每日下寸白蟲甚多脾腎所積非泛泛之蟲可比大熟地五錢川黃柏一錢棐子肉一兩淡乾薑五分炒白朮土炒三錢淡黃芩四錢烏梅肉三個扁竹三錢野黃精五錢案蟲以濕土為窠臼治脾土以化之此論治蟲之統法也下扁白蟲甚多養腎元以化之不致布子為妙大熟地五錢野黃精五錢細棐子肉一兩萹蓄三錢蒼白朮各三錢川黃柏一錢酸烏梅三個乾薑五分白茯苓三錢服藥以來下蟲日減頭暈全好肌膚不熱原方加減原方去白朮丸方私鹽鹼二兩枯礬七錢鉛灰三錢棐子肉八兩北麥鈣八兩黃土四兩紅糖為丸補脾腎以來扁白蟲已淨念餘日五月初旬喉癢痰多現交夏至節令暑濕將動濕濁必甚恐有布子之患仍養脾腎以淨根株大熟地川黃柏棐子肉製半夏冬蒼朮野黃精烏梅肉雲茯苓生苡仁化橘紅適接來札服藥後腹內平靜無聲此蟲蠱何疑後忽嘔吐泄瀉並有青黑磚瓦色茶杯口大數塊蟲蠱化而未盡更恐夾以暑濕積食亦未可定未見症不能懸揣且實系蟲化亦當下行者順上行者逆逆則脾陰大傷正虛積不能化甚為險要但不知脈象如何耳姑擬固正下積靜以待動人參川椒炭煨木香赤茯苓川雅連烏梅肉臺烏藥建澤瀉大丹參板藍根十九風濕腳氣案脈來沉滑而疾濕痰內郁化熱生風先是腳面麻木引延兩手右手食指跳動井肩環跳俱癢入暮潮熱當理太陰陽明化濕熱以杜風患二妙散加於朮桑葉黑芝麻赤茯苓熟地甘草車前子豨蘞草進二妙加味理太陰陽明化濕熱杜其風患手足麻痹俱蘇潮熱井肩環跳癢患俱已尚覺跳動餘波未息以丸緩圖桑麻地黃丸二妙散加冬朮潼蒺藜豨蘞草苡仁威靈仙蜜丸脈來滑疾風濕鬱於陽明肝腎不足兩腿兩手脊筋作痛寐來更甚兩耳作響濕熱鬱結氣化為火左秦丸一錢白蒺藜三錢石菖蒲八分赤茯苓四錢宣木瓜一錢茅山術三錢遠志肉一錢通木通八分接來恙原服藥已效將木通減去三分加車前子二錢黨參三錢服數帖便中來商再為診脈擬方順候近安知名恐呼奉返謙簡每早服二妙丸案腎虛真陽不旺脾虛濕熱不化風濕發於四肢浸水裂皮癢多痛少皆屬於虛年甫四旬陽不振作利濕傷陰祛風耗氣速當固本六味地黃丸加白蘚皮枸杞桂圓肉大胡麻二十痿痹案脈來虛數而弦三陰內虧濕熱鬱而不化腎氣不衡肝不榮筋精血大虧腿瘦脛彎痛無寧息病勢不一股內熱痛大腿如針刺痛膝蓋脛彎俱酸冷脹痛魄門墜脹疼痛左腿形如鶴膝坐臥不寧飲食不甘病延已久下痿已成慮難奏捷多酌六味地黃丸加川黃柏蓯蓉菟絲子巴戟天兩進平補三陰逗留微陽而化濕熱胃口漸開諸痛稍減扶持可以步履心內不時嘈雜似覺空懸無倚食物即定小便頻數拖延多日虧損已極服藥應手已見生機原方加減原方去黃柏加麥冬黨參天冬服藥三帖飲食漸增大便通行小溲色黃不數左右皆能平臥步履能行精神已振惟左腿外臁久坐仍有微痛久立亦然病雖見痊精神未充以煎方十劑作丸回府慎調為妙案脈來虛數肝腎兩虧酒色內傷腰痛肋脹延今兩腿麻木步履無力口乾便結少腹作墜謹防下痿六味地黃丸加巴戟天蓯蓉黨參每日服虎潛丸案風寒濕三氣合而為痹周身痠痛右腿及曲池痛甚已歷三年寒濕凝筋先擬蠲痹湯加味嚴氏蠲痹湯加威靈仙木瓜金毛狗脊二十一疝氣案經以任脈為病男子內結七疝衝任同源為十二經脈之海起於腎下出於氣街並走陽明經夾臍上行至胸中而散症因思慮煩勞損傷中氣虧及衝任任虛則失其擔任之職沖虛則血少不能榮筋肝主一身之筋與腎同歸一體前陰為宗筋之會會與氣街以故睪丸下墜不知痛癢名曰㿗疝前哲治法頗多效者甚鮮暫從中治補陰益氣煎加白朮茯苓川芎製半夏蜜丸案肝藏諸經之血腎司五內之精疾走恐懼飢食渴飲致傷肝腎精血兩虧精虛不能化氣血虛無以榮筋致令氣滯寒凝筋攣血積因而成疝六載以來日以益大不知痛癢此為㿗疝七疝之中茲其最甚溫通氣血以散凝寒培補肝腎以舒筋絡古之成法也未見方案二天不振八脈有虧任脈不足睪丸下墜偏於左者肝也腎氣通於耳水不濟火則耳鳴火熾陰消則精滯脈來虛數少神脾腎雙補為主大熟地八兩東洋參三兩遠志肉一兩五錢煨木香八錢山茱萸四兩歸身三兩酸棗仁三兩福橘皮二兩淮山藥四兩炙甘草八錢雲茯苓三兩蜜丸二十二陰痿案未冠先傷乾破為離左尺散右尺細根蒂大傷現火令司權水不配火涸徹燎原理宜補坎填離火氣發泄之時天時暑熱為動地之濕濁必勝下虧體質最易觸犯不能不前後兼顧大熟地線魚鰾淮山藥干石斛太子參沙苑子南山楂白茯苓心有所思意有所歸意淫於外精搖於內神志不藏根蒂大虧必得息慮保守太和水源生則龍相寧水升火降自有懷欣之舉原方加二至丸案精也者神依之如魚得水氣依之如霧覆淵先天氤氳而無形後天有形而可見男女媾精萬物化生得自然之氣生子必壽養先天煉後天水升火降則為和會見歡娛之舉自然入谷不可徒事於補陽燥熱竭陰致有亢制之弊非徒無益而又害之鯉魚子一具大熟地八兩焦於術三兩當道子一兩五錢鹿角膠四兩薯蕷四兩雲茯苓神各三兩覆盆子三兩黃魚鰾三兩甘枸杞四兩半夏粉一兩五錢蓮子肉四兩肉蓯蓉四兩益智仁三兩菟絲子三兩胡桃肉四兩巴戟天三兩雞頭粉四兩山芋肉四兩東洋參四兩文武實四兩用二至丸鮮橘熬膏和丸案思為脾志心主藏神神思過用病所由生心為君主之官端拱無為相火代心司職曲運神機搖動相火載血上行下為遺瀉因循怠治病勢轉深更增虛陽上越眩暈等症諸風掉眩皆屬於肝面色戴陽腎虛故也不能久立久坐者肝主筋腎主骨肝腎不足以滋榮筋骨也眼花耳嘯者腎氣通於耳肝開竅於目水弱不能上升血少不能歸明於目也胸背之間隱痛如裂者二氣無能流貫脈絡不通也嘔吐黃緑水者肝色青脾色黃青黃合色則緑乃木乘土位之徵也前陰為宗筋之會會於氣街而陽明為之長心脾不足衝脈不充宗筋不振陰縮不興滋陰降火苦堅之法最是良謀惜少通以清寒之品以故無效不受溫補熱塞之劑者蓋壯年非相火真衰乃抑鬱致火不宣揚膻中陰瞑離光不振也相火不足宜益火之源以消陰翳相火不宣則宜斡旋中氣以暢諸經譬如腎火蔽障則微透風則翕然而起矣七福飲加煨木香沉香琥珀黃柏茯苓元參蜜丸二十三遺精案心旌上搖相火下應意淫於外精滑於內精傷無以化氣氣虛無以生神形神慵倦肢體無力陰不斂陽浮火時升寐中口燥間有妄夢而遺症屬陰虧二至丸六味地黃丸加石蓮肉案未冠先傷乾破為離陽升莫制陰精下損夢泄頻仍眉稜骨痛如刺厥少之風擾動陽明當培其下彩龍齒三錢大熟地八錢沙苑子三錢淮山藥三錢玄武版三錢女貞子三錢石蓮肉二錢大麥冬二錢案心主藏神腎主藏精神傷於上精滑於下五日一遺者非獨心腎不交乃中土大虧之明驗也五為土之生數生氣不固殊屬不宜黑歸脾湯去桂圓木香蜜丸案肝司疏泄腎司封藏二經俱有相火其繫上屬於心心為君火心有所動則相火翕然而起此遺泄之所由生先服荊公妙香散加減安神祕精東洋參八錢白茯苓神各五錢炙遠志五錢益智仁五錢花龍骨八錢丹砂二錢五分炙甘草五錢為末酒調服案恙原疊載前方茲不贅述惟心腎不交求其所致緣少年真陰不固真陽不守目有所見因有所慕意有所樂欲想方興不遂所致蓋心有愛則神不歸意有想則志不定心藏神腎藏志脾藏意意不和遂致三經否隔此心腎不交之本末也二十餘年病多變態近服歸脾獲效是求本之功豈泛治所能瘳也心腎不能自交必謀中土擬媒合黃婆以交嬰奼歸脾湯加煨益智仁水丸精之藏制雖在腎精之主宰則在心精之遺泄聽命於心君心為君火腎為相火君火上搖相火下應二火相煽消爍真陰情迫於中莫能自主腎欲靜而心不寧心欲清而火不息致令嬰奼不交夜多惡夢精關不固隨感而遺二十餘年前進媒合黃婆以交嬰奼數月以來頗為獲效第病深藥淺猶慮來復仍須加意調養通志意以御精神宣抑鬱以舒魂魄方克全濟大熟地八兩白茯苓三兩石蓮肉二兩酸棗仁三兩東洋參四兩於白朮三兩淮山藥四兩炙遠志一兩五錢菟絲餅三兩粉黃耆三兩芡實粉打糊為丸二十四溲血淋濁案年甫草三據述六歲時夏天癃閉急脹淋滴色紅乃血鬱也以後每年或發一二次十歲之外漸次較重血餅血絲疼痛不已十日半月方止今年三月舉發血色鮮紅痛甚覺熱完姻後所服犀地湯理路頗好熱伏閉門火掩精關溺血則血去不痛有痛者則為赤淋擬七正導赤散加減中生地八錢淡竹葉一錢五分西滑石三錢真毛珀三分細木通一錢芣苡子一錢燈心草三十寸側柏葉一錢二分甘草梢二錢扁竹三錢龍膽草一錢五分海金砂三錢三進導赤七正未見進退濕熱傷陰心移熱小腸也火掩精關久非所宜原方增損前方去生地側柏海金砂加太子參黑山梔雲茯苓又方用豬溺臍一具孩兒參三錢卷柏三錢長流水煎炭火煨爛食案脈左弦右軟氣虛陰虧肝之陽強必由鬱怒所傷氣失調達心火濕熱下注火掩精關疼痛淋濁乃濕傷氣熱傷陰補陰益氣棋之先著擬方候酌六味地黃丸去山芋肉加太子參毛柏甘草節滑石山楂木通升麻柴胡怒傷氣濕熱不化肝失調達濕熱下注疼痛淋濁肝主疏泄腎司祕藏補陰益氣夜間淋濁已少尚有精疼夜黃晝清行動腿膝無力呵欠神倦正氣腎氣俱虧濕熱余分未淨原方加減前方去山楂加麥冬兩進前方淋濁已轉白色漸漸減少溲黃變白飲食未香呵欠神倦腰膝軟弱日晡幽門氣墜正氣腎氣虧而未復六味地黃丸去山芋肉加生地麥冬孩兒參茯神精傷無以生氣氣虛無以生神淋濁雖好腎氣已虧午後呵欠神倦精傷不能化氣也六味地黃丸加生地孩兒參野料豆案濕熱傷陰溺管疼痛間或血淋腎之陰虧血不化精精不化氣色酒二字宜戒初起宜清久則宜斂已延四月自患之後小便仍有白濁溺痛不解小溲黃赤管痛尤甚養肝腎之陰以化濕熱小生地大麥冬粉丹皮建澤瀉太子參川黃柏白茯苓神益元散濕熱傷陰溺管疼痛血淋之後陰陽未復脈來數象水部有火濕熱有餘熱瀝不盡前方加甘草梢千里馬進補養肝腎與化濕熱溺管痛舒血淋亦止四五日間有疼痛脈來虛小肝腎精血未復餘氣未盡以丸緩圖清養為妙大小生地八兩牡丹皮三兩木茯苓神四兩建澤瀉三兩太子參二兩大麥冬三兩鮮石斛四兩甘草梢八錢烏犀角磨汁和三錢潛葳蕤四兩川黃柏一兩水丸服丸以來溺管痛止黃赤俱無惟小便後管中間有噓縮之氣乃陰虛未復腎元不固原方加減生熟地黃湯加川黃柏麥冬孩兒參烏料豆蓮肉燕根豬脊筋案海藏云忍精則淋忍溲則癃忍大便則痔至於淋濁有痛不痛先後痛之分有黃白赤色之異陽舉則痛腎囊潮黏淋系赤色皮外作癢勉飲大醉後兼之夢遺素來忍精濕留精關不宜過利亦不宜溫補當治陽明補陰益氣煎加冬瓜子五進補陰益氣淋濁已止陽舉不痛皮外不癢脈來左大晨舌作干陰虛不能上潮以乙癸同源六味地黃湯加桔梗陳皮案始由溲多不暢管中如火球上下滾痛尿後更甚四陰煎去百合加參三七黃柏旱蓮案脈來弦大兩尺不靜濕熱傷陰心相不靜欲火凝結濕鬱不化考五淋治法不越虛火實火必得清心絶欲方能有濟孩兒參山梔甘草頭萹蓄老式琥珀大麥冬青竹葉小木通鮮石斛瞿麥穗心之動為意意有所歸心相不靜欲火不散精液不息陽強不倒寐則尤甚陰不化氣氣即火也治之不易心如鐵石耳目清淨心意不動庶幾可效前方去木通加小蓮子清心保腎寡欲固精乃生生之道原方加減前方去瞿麥琥珀小蓮加蓮鬚五味炙桑螵蛸二十五癃閉案膀胱為州都之官津液藏焉氣化則能出小便淋漓不暢少腹大腹微脹舌絳口乾固由濕熱傷陰亦由精不化氣氣化無權服藥或效或不效者裡氣空虛也肝主疏泄腎主閉藏州都無約水泉無束考古名家虛火虛氣濕熱不化補中兼開隆冬閉藏年逾六旬脈不應指似無通利之法恐傷生髮之氣補陰益氣煎加冬瓜子每日晨服老六味地黃丸午後服十九味資生丸一助乾健一法坤順案脾司清陽胃司濁氣腎司二便肺主治節年逾花甲二氣漸衰濕熱內傷臟不行腑氣化無權但兩脈俱弦按之無力真陽虛衰真陰亦傷脾胃困頓小溲不通氣化不及州都補陰益氣煎六味地黃丸改金匱腎氣丸法助乾健坤順升清降濁濕熱漸化二便已暢氣墜已減精神未健久病真元難以振作原方進步前方加穀芽補命腎以建中陽健脾胃以化濕熱補陰益氣升清降濁腑氣已調小溲暢行臟已安適脈之雙弦已和面色已開精神漸起以丸徐徐調養自臻安吉金匱腎氣丸加半夏橘紅桑筋白沙參蜜丸二十六便結案經以腎開竅於二陰主五液而司開合飲食入於胃津液輸於脾歸於肺注於膀胱是為糟粕轉入小腸傳送大腸出於廣腸是為大便其中醞釀氤氳之氣化生精血滋潤五臟營養百骸蓋大腸傳送相傅為之斡旋故肺與大腸相表裡肺為傳送之官治節出焉腎之液涸賴州都為之藏蓄故腎與膀胱相表裡膀胱為州都之官津液藏焉小溲多而大便結正與小溲祕而大便泄同歸一體便瀉便祕乃清濁相混溲多便結乃清濁太分過猶不及脈來軟數無神尺部尤甚證本陰虧水不制火火灼金傷寒熱如瘧注泄之後五液耗干肺不清肅無由下降致令開合失司傳送失職州都津液少藏故大便祕而小便數擬清上實下主治清上則肺無畏火之炎實下則腎有生水之漸冀其金水相生肺腎相資清歸於肺潤歸於腎則大腸無燥閉之患愚見未識高明以為然否鮮首烏二兩羚羊片三錢淮牛膝五錢當歸梢三錢南沙參八錢甜杏仁一兩分三次服案六脈細軟按之少神恙由肝腎不充氣虛不健以致小溲勤而短大便反結經云腎開竅於二陰陰不足則氣反虛而不運法宜益氣以清陰制首烏肉蓯蓉當歸身桑螵蛸鹽水炒楮實子枸杞子杭白芍於白朮生牡蠣二十七便血案寒生濕濕生熱熱生風風擾陽明之絡血絡瘙癢無度臟寒生熱便血多年黑地黃黃土湯皆是法程但濕熱傷陰陰不化燥氣不攝血血虛生風宜養心脾歸脾湯去黃耆桂圓木香加生地犀角冬桑葉三角胡麻每早服桑麻地黃丸案便後血乃遠血也色紅脫肛半時乃上已歷十餘年頭暈神倦暑熱脫肛不上腎司二便中虛腎虛補中歸脾是理奈肝腎陰虧氣失攝納補陰益氣煎加阿膠赤石脂乾荷葉案脈數且滑濕熱傷陰腸風便血六味地黃丸加炒槐米荊芥炭黃芩次加側柏葉炒枳殼炮薑炭案便血多年先後不一先紫後紅並有血塊腹中隱痛脈來滑數按之無力三陰內虧濕熱不化陰絡受傷肝不藏血脾不統血氣不攝血滲入大腸而下生熟地四錢側柏葉三錢箱當歸三錢黑薑炭五分赤石脂三錢炒冬朮三錢杭白芍三錢酸棗仁三錢槐花炭三錢阿膠珠二錢二十八泄瀉案暑熱濕痰滯傷於脾胃腹響痛瀉小溲色赤進平胃加減雖輕未已原方進步乘此驅逐否則久延正虛防生歧變制根朴赤茯苓南木香上廣皮範志曲建澤瀉淡乾薑甘草脾喜燥而惡濕濕滯脾土痛泄嘔惡進理中胃苓痛止嘔平瀉勢欲止舌苔漸化夜寐已安脾胃漸和慎調為妙六君子湯加木香蔻仁穀芽乾薑案脈左緊右緩緊是腹痛之徵緩是脾玩之候暴起寒濕水氣作瀉溫尉是理已延月餘繞臍作痛氣虛作墜痛則作瀉濕鬱化熱之象精通之歲陰未和諧久瀉又傷以香連歸芍湯加減是否候酌廣木香杭白芍南山楂當道子川雅連銀條參赤茯苓甘草全當歸每日早晨服老六味地黃丸午後服十九味資生丸案面浮肢腫入谷則出腹脹胸悶大便溏泄小水不暢六脈沉緊而澀舌根白色不起風濕抑鬱食填太陰臟寒生滿濁氣逆上則生䐜脹清氣反下則生泄瀉總由出納之官應運不靈是以二陰開竅不爽擬溫里以開通上下延久脾陰大傷牽及腎氣更為棘手製附子黑炮薑廣橘皮建澤瀉川根朴採云曲肥牛膝赤茯苓枳實炭冬瓜皮二十九七竅案頭寒鼻塞流涕漸成淵症蒼耳散去白芷加桔梗杏仁當歸陳皮首烏案鼻塞流涕腦已發空此腦寒淵症也細生地肥玉竹白蒺藜辛夷潤元參大麥冬玉桔梗蒼耳子案腦為髓海鼻為肺竅腦滲為涕膽移熱於腦則辛頞鼻淵每交秋冬鼻流腥涕不聞香臭肺有伏風延今七載難於奏效孩兒參三錢杏仁泥三錢淡黃芩一錢五分蒼耳子二錢細生地三錢甘菊花一錢生甘草五分辛夷一錢桑白皮一錢五分白蒺藜去刺三錢案鼻涕稠濃且有腥味年甫十九鼻息不利有息肉腦空之患脈來滑疾已延七載難於奏捷擬清上實下主治瀉白散去粳米加孩兒參黃芩茯苓杏仁甘葛蘆根野菜花案膽移熱於腦則辛頞鼻淵蒼耳辛夷乃是本方風熱濟於陽明肺氣不展桑白皮羚羊皮白蒺藜雲茯苓廣藿香中生地淡黃芩野菜花案經以膽移熱於腦則辛頞鼻淵膽為甲木腦為髓海鼻為肺竅素本酒醉肥甘過當或為外感所乘甲木之火由寒抑致生濕熱上熏巔頂津液溶溢而下腥涕常流為鼻淵之候譬如火暑濕熱鬱蒸乃能雨源源不竭髓海空虛氣隨津去轉熱為寒亦猶雨後炎威自卻匝地清陰而陽虛眩暈等症所由生也早宜調治久則液道不能扃固甚難為力也薄荷尖八分防風根一錢白蒺藜三錢辛夷一錢五分香白芷一錢五分雀腦芎一錢茅山術二錢炙甘草五分案身懷六甲火犯陽絡血溢清空由竅而出名曰鼻衄治宜清金和絡烏犀角五分杭白芍二錢淡黃芩五錢生甘草五分小生地八錢大麥冬三錢白茅根五錢案先天不足火犯陽絡血溢清竅為衄六味地黃丸加淮牛膝淡黃芩黑山梔白茅花案風濕擾犯陽明火乾血絡血溢清竅而出乃鼻衄也桑麻地黃丸加牛膝麥冬茅根蘆根案目為肝竅經以五臟六腑之精氣皆上注於目而為之睛睛之窠為眼骨之精為瞳子筋之精為黑眼血之精為絡氣之精為白眼肌肉之精為約束曾經目赤因循未愈近乃白睛赤縷參差浮紅成片時多淚出內眥凝眵而瞳子黑睛無恙此腎水下虧不能生木木燥生火火甚生風風火相搏肺金受制白睛屬肺肺熱故白睛發赤時多淚出譬如熱生風乃能雨熱耗津液故多眵脈來軟數而空有赤脈貫瞳子之慮治宜壯水生木升陽散火不可泛服滌熱之劑經有上病下取之旨擬明目養肝丸加減明目養肝丸去川連膽草青鹽防風羌活肉桂加霜桑葉用羊肝煮爛搗加蜜丸案肝有風熱翳膜遮睛曾有紅腫失於調治致令水不濟火木燥生火風火相搏髓液潛消經以諸髓皆屬於腦髓熱則腦熱腦熱則脂下流為翳偏於左者屬肝也宜先清髓退翳為主羚羊角一兩草決明一兩五錢青葙子一兩五錢木賊草一兩五錢黑山梔一兩五錢白蒺藜三兩大白芍二兩銀柴胡一兩蔓荊子二兩黃菊花一兩全當歸一兩五錢炙甘草八錢蟬衣肚二兩川芎一兩蜜水丸案水虧於下火升於上水不制火陰不勝陽緣少年嗜欲太過水失所養木燥生風風火交併於上陰液潛消於下致令黑睛暗淡瞳子無光色兼藍碧此為內障經以五臟六腑之精氣皆稟受於脾脾明於目脾為諸陰之長目為血脈之宗腎為先天之源脾為後天之本脾土之強健賴腎氣之充盈腎氣虛脾亦虛脾虛則臟腑之精氣皆失所司不能歸明於目肝虛則血不歸原腎虛則水不濟火以故暗淡無光治宜壯水濟火補陰潛陽冀其水升火降濟陰地黃丸去巴戟菊花加牛膝菟絲子東洋參元武版丹皮茯苓白朮天麥冬福澤瀉橘皮甘草用長流水桑柴火熬膏服膏以來脾腎尚未充足睛光頗有聚斂之機視黑睛外一道藍圈如月暈之狀夫月之有暈乃太陰之精不振而陰霾之氣蔽之陰霾蔽月為之暈為陰精尚在無月則無暈矣被光黑水蘊於中射於四維圍於外雖失明無視為根本尚未頽殘猶可治也舌者心之官也服補陰潛陽之品舌反乾燥者乃腎水枯涸之徵不能上濟心火心為君火腎為相火君火以明相火以位君火上搖相火下應腎欲靜而心不妄心欲靜而火不息腎水何由而升心火何由而降殊為可慮是宜澄心靜養恬淡無為假以歲月助以藥餌方能有濟左歸丸去鹿角膠加天麥冬蓯蓉歸身五味冬朮西洋參鮮石斛覆盆子野黃精熬膏案白眼屬肺黑眼屬肝瞳人屬腎目胞屬脾目系屬心精滑四載有餘腎水陰精交損不能上注於目卒然瞳人背明腎實精空尾閭穴痛形容頽敗食少多眠服藥以來飲食稍加精神漸振遺泄漸稀能間二三日目光如電光神光不斂可之黑白分明瞳人之中並無煙障之氣混緑之色非內障可比仍以固腎填精斂精化液之品為丸緩治第少壯年華服藥寡效非其所宜還元丹去地骨皮加東洋參羚羊角紫河車白朮芡實粉牡蠣粉菟絲子五味子煅靈磁石辰砂歸身金櫻子膏和丸案腎虛有火耳鳴失聰炙龜板大熟地肥玉竹九節蒲石決明沙苑子制首烏粉丹皮左牡蠣建澤瀉案經以十二經脈三百六十五絡其血氣皆上注於目而走空竅其彆氣走於耳而為聽心開竅於耳腎之所司也腎為藏水之臟腎虛則水不能升心火無由下降壯火食氣氣虛不能上走清空陰液下虧脈絡為之乾涸氣血源流不暢是以耳內常鳴素多抑鬱五志不伸水虛不能生木肝燥傳脾土虛不能生金肺病及腎腎氣不平五內互克展轉沉疴歲月彌深壯歲固不足慮恐衰年百病相侵故不僅耳閉已矣是宜沉志靜養遣抱舒懷補以藥餌方可有濟擬局方平補正心丹去上病下取之意平補正心丹去車前子山藥硃砂柏子仁加白朮丹皮龜板元參山梔蜜丸案齒痛上引太陽因眩暈左肢麻痹而起金水二臟素虛眩暈乃肝邪所致金虛不能平木水虛不能制火故肝陽內擾陰火上升肝位於左氣虛則麻兼以酒酪肥甘過當濕熱蓄於腸胃上壅於經故見手足陽明手太陰足少陰四經之症夫齒痛屬陽明之有餘眩暈麻痹屬太少之不足按靈樞經脈篇手陽明之脈其支者從缺盆上頭貫頰入下齒中足陽明之脈下循鼻外入上齒中齒痛之由本此第久於歲月病勢已深調治非易爰以清胃玉女加味從陽明有餘少陰不足論治清胃散玉女煎加澤瀉鹿銜草案經以南方色赤入通於心開竅於耳外候於舌七情不適傷乎心也盛怒不解傷乎腎也腎虛水不制火心火上熾舌為之糜法當壯水之主佐以介類潛陽六味地黃丸去芋肉加二至丸炙鱉甲龜板五味子牛膝蜜丸案腎水不足心火有餘舌為心苗火性炎上水不濟火舌為之糜脈來軟數無神緣五志乖違所致上病下取滋苗灌根法當壯水之主以制陽光六味地黃丸去山芋肉加牛膝麥冬地骨皮武版水丸案誦讀勞心心火刑金金溶不鳴聲嘶語言難竟治宜壯水清金行其清肅之令天王補心丹去桔梗天冬加南沙參案腎水不足肝木失榮木燥生火火甚生風風火交併上冒清空聲啞舌強視聽不聰脈來軟數無力治宜益氣壯水調中冀其水火既濟天地交通六味地黃丸六君子湯蜜丸案音聲本於臟氣氣盛則聲揚氣虛則聲怯腎為音聲之本舌為發聲之機氣為聲音之戶腎主藏精精化為氣肺司氣化氣主發音證由誦讀太過損於臟氣河間以五志過極俱從火化火盛刑金金溶不鳴舌為心竅腎為水臟火性炎上火旺水虧傷其本而失其機是以聲啞語言難出脈來滑數而空爰以鐵笛加減大生地八兩紫菀茸三兩訶子肉三兩桑白皮二兩天麥冬三兩薄荷葉一兩連心翹二兩炙甘草一兩北五味一兩甜桔梗二兩大貝母二兩竹葉水丸三十婦人案經以任脈為病女子帶下客秋小便有血秋後帶見五色每逢小便作痛夜寐不安飲食不甘心移熱於小腸濕熱肝火內郁病延半載極難奏效山梔子一錢五分海金砂一錢甘草節一錢扁竹三錢太子參三錢湖丹皮一錢龍膽草一錢蓮子心八分赤茯苓三錢側柏葉一錢燈心草三寸服藥四帖赤帶仍多白帶微解寒熱已輕小便痛亦微止臥稍安飲食亦甘原方加減七正散加生地丹皮燈心寒熱已解帶亦減溲痛亦寧欲食漸增原方分量略更疊進七正散加味帶下已痊溲痛已愈飲食亦甘惟血虛頭痛兩腿痠楚乃氣血兩虛肝腎濕熱未清歸芍地黃湯加減歸芍地黃丸去芋肉加草梢萹蓄竹葉燈心帶下溲痛俱愈惟右脅作脹血虛頭痛精神不振宜補三陰佐化濕熱歸芍地黃丸桑螵蛸草梢案日來帶下頻頻不止大便艱痛小水色黃不暢腹內有硬塊腰膝痠痛經云腎氣開竅於二陰陰虧陽不斂虛寒之質液絡精氣枯涸大為可慮東垣謂連桂同功能交心腎於頃刻納氣下降導火歸原亦前賢之良法也立方呈政須與貴處諸同道切脈驗證服三四帖仍祈賜酌六味地黃丸加大古勇上卷桂淮牛膝川杜仲杭白芍左牡蠣雞頭實案經以女子二七天癸至任脈通太衝脈盛月事以時下又二陽之病發心脾有不得隱曲女子不月其傳為風消其傳為息賁者危汛閉年餘飲食日少形體日羸脈來絃動乃郁損心脾木乘土位所致心為生血之源肝為藏血之臟脾為統血之經心境不暢肝不條達脾失斡旋氣阻血滯痞滿生焉五志不和俱從火化火灼真陰血海漸涸故月汛不以時下必致血枯經閉而後已將治心乎有形之血難培將治脾乎守補中州易鈍抑治肝乎條達滋柔均皆不受當以干運中樞為主俟脾胃漸開以四物逍遙養肝舒郁再以歸芍地黃補陰養血和調衝任冀其經通方為佳兆方未見案左脈弦出寸口志意隱曲不伸抑鬱損心陰陰虛血少血不榮脾脾傷不能為胃行其津液胃病不能容受水穀而化精微精血日以益衰脈絡為之枯澀經閉半載有餘腹中虛脹作痛榮色憔悴飲食減少擬歸脾法歸脾湯去黃耆加柏子仁阿膠澤蘭葉服藥五帖病勢似有退機因循怠治停藥月餘遂至䐃肉全消喘鳴息肩症本隱情曲意郁損心脾病傳於胃所謂二陽之病發心脾是也心為生血之源胃為水穀之海脾為化生之本海竭源枯化機衰憊血枯經閉氣鬱化火火疾風生消灼脫肉故瘦削如風馳之速也火灼金傷氣無依附故喘息如逝水之奔犯經旨風消息賁之忌雖倉扁復生無如之何姑擬一方以副遠涉就醫之望大生地三錢大麥冬一錢五分柏子仁二錢澤蘭葉二錢東洋參三錢陳阿膠二錢白歸身三錢白茯苓三錢案經血乃水穀之精氣調和於五臟灑陳於六腑源源而來生化於心統攝於脾藏受於肝宣布於肺施泄於腎上為乳汁下為月水經祕五載有餘飲食起居如故無骨蒸痰嗽等症乃任脈經墜滯塞非血枯可比手指腫腫色紫不時鼻衄經血錯行可知營氣不從逆於肉裡遍體瘡癢脈來滑數而長有癰疽腫滿之患擬子和玉燭散多酌玉燭散案汛愆胸腹相引而痛痛時手足逆冷食生冷寒涼即發腹中雷鳴脈來沉細顯是命火中陽不足以煦和五內而敷榮四末由産後氣血雙虧虛寒為祟治宜益火之源以消陰翳桂附地黃丸加黨參歸身川芎炮薑案素本月事不調今正晡熱巔疼脛腫經居三月脈來滑數年甫草四肝脾不和胃不開暢濕鬱不行理脾胃以觀動靜白朮炭淡黃芩酒炒肥知母須穀芽全當歸縮砂仁川杜仲老蘇梗白茯苓淮山藥案腹中作痛痛連胸口手足發冷不宜寒涼生物腹中氣鳴月汛愆期皆由産後失調氣血交病虛寒為患四物湯加炮薑香附茯苓白朮甘草砂仁紅糖益母膏案坤道首重調經經不調來時少腹作痛病在厥陰肝病善痛肝傳脾脾病善脹脾傳胃胃病善嘔飲食不甘脾胃並病有妨孕育香砂六君子湯加艾葉紅糖香附歸身又五花酒方紅白荷花月季花玫瑰花桃花益母花浸百花酒又丸方六君子湯加砂仁香附茺蔚子澤瀉蘄艾當歸紅糖為先案年已四五生育多胎氣血皆虧月不及期顏色紫黑精神倦怠夜來少寐早起作嘔痰不易出兼之氣鬱傷肝悲哀動中左腹氣瘕飲食減少心肝脾三經俱病先以解鬱疏肝兼養心脾歸脾湯去黃耆桂圓加阿膠茯苓金橘餅紅糖解鬱疏肝以養心脾已服二帖鬱結化火心煩作渴六日未更衣頭眩浮火內擾木鬱達之火鬱發之補中益氣湯去黃耆一本用逍遙散加山梔丹皮天麻石斛生地案月不及期少腹作脹手足麻木飲食不甘心膽自怯氣血不調心肝脾三經受病歸脾湯去黃耆棗仁加白芍柏子仁案痛經症緣陰不濟陽氣血兩損加以痼冷沉寒則月信不獨作痛亦且愆期經者常也氣血反常宜陰陽兩固擬八珍湯佐以溫里達下久服自可獲效八珍湯加熟附子丹參黑薑炭案素有痛經症陰液本虛今春腹痛作瀉寒熱嘔吐脹悶頻頻不止感邪夾濕胃脘久傷六脈沉澀左部尤甚胃為水穀之海陽明阻塞清不能升濁不能降脾濕生痰肝木侮土最為險要況當經期猶須防內因外感二者交病恐生厥搐厄逆肢冷之險臺烏藥於白朮煨木香炮薑灰白茯苓建澤瀉蘇橘紅紫丹參六神麯生苡仁廣鬱金血分暢行痛脹已定脾胃不和食仍不暢土為萬物之母火為生化之源補土和陰脾腎兩固經常也經不反常土能自潤土潤則水流緩緩培養乃能獲效擬益母八珍加以宣劑益母丸八珍湯加黑薑橘紅遠志案保元之法先在調經經前痛脹是以艱於生育此謂痛經益陰濟陽總宜氣血和平平則陰陽不爭和則榮衛不乖宜溫補達下以調氣血擬益母勝金丹和烏雞丸法加減鹿角膠大熟地茺蔚子黑薑炭龜板膠雀腦芎枸杞子白茯苓清阿膠箱當歸川杜仲黃酒左牡蠣杭白芍於潛術童便烏骨雄雞熟附子紫丹參煉蜜丸案女子以肝為先天肝為血海經前痛脹肝不平寧血不和暢始因痎瘧邪留肝腎腿足常腫發則痛不可奈腳氣類傷寒寒熱氣衝濕熱鬱結隨氣上衝心則厥沖胃則吐當治陽明調氣血以化濕熱六味地黃丸加冬朮苡仁沉香案肝鬱氣聚氣聚血結胸脅跳痛一日數次嗆咳氣促經閉半載日哺寒熱寅汗而退飲食不甘頻頻白帶七情鬱結之病必得心境開舒肝氣方能條達佛手片淮牛膝炙甘草酸棗仁全當歸湖丹皮白茯神炙遠志茜草根銀柴胡早服調氣丸臺烏藥花檳榔蓬莪朮廣鬱金降香屑新絳屑以上俱醋炒紅糖為丸晚服調血丸生地黃京赤芍當歸身川芎蘄艾葉紅糖為丸左脈尚緩右脈尚大氣鬱填胸氣血俱病五損之病宜從中治調其飲食適其寒溫心暢肝和脾胃健運方能有濟黨人參白茯苓炒穀芽五穀蟲炒白朮上廣皮蓬莪朮雞內金玫瑰花露荷葉包陳倉米三更腹痛四更經行淡紅而少五更紫色而多小腹墜而痛氣結血凝原方加減前方去內金谷蟲加當歸川芎白芍延胡索紅糖色仍紫少腹仍痛雀腦芎淮牛膝上肉桂上陳皮全當歸炮薑炭延胡索紅糖案本有經前後疼痛現病有兩旬未止右腿右肋俱痛右腹硬痛氣血凝結肝脾不和廣木香全當歸雀腦芎益母草砂仁米杭白芍白茯苓赤砂糖制香附延胡索炙甘草又加檀香案痛屬於肝脹屬於脾汛來腹痛而脹乳房墜痛堅硬如石氣鬱動肝肝胃不和氣血凝結歸芍異功散去黨參加元金散砂仁川芎香附山楂檀香水丸案九載月事不調尚未生育喉內作干腹中沉墜肝脾氣血失調病延已久治之不易六味地黃丸膠艾湯加茺蔚白芍案肝為血海脾為血源結婚以來未能生育月信不調腹中沉墜年已草七經來先後不一病在至陰肝脾俱病治之實難歸芍地黃丸去丹皮加香附生地阿膠茺蔚子甘草月季花紅糖為丸案女子首重調經經調方能有孕經先期少腹脹痛不時嘔噦脈見雙弦無力少腹主於肝肝病善痛肝傳脾脾病善脹脾傳胃胃病善嘔飲食不甘肝脾胃俱病以丸緩治八珍湯加益母花煨木香艾葉水丸案經斷復來老年防脫四物湯加木瓜絡丹參香附益母草案十七歲天癸至咳嗽失血乃倒經重症法順氣導血白蘇子鬱金片黑山梔鉤藤後下降香末山楂炭牡丹皮案經者常也失其常則病離其經則瘀瘀行下紫黑色氣不攝血則湧宜固正和瘀養陰調氣四物湯加牛膝黨參棗仁益母草茯神丹皮參血餘炭蒲黃炭阿膠澤瀉案經阻二載少腹堅硬大便不爽不時咯出紫血塊此屬血蠱之象製大黃川桃仁鮮生地汁生薑自然汁上桂心郁李仁案經以齒乃骨之所終手足陽明之脈上循於齒地癸主於衝脈沖為血海並足陽明經而行陰虛無以配陽水弱不能濟火經事先期不時齒痛當以陽明有餘少陰不足論治玉女煎去石膏加丹皮澤瀉佩蘭葉丸方照煎方去牛膝佩蘭加鮮石斛焦梔當歸蜜丸案氣不衛外則寒血失中營則熱經無約束則愆期二氣素虛奇經復損督行一身之陽任行一身之陰任督猶天之子午衝脈從中直上若地之云升法當靜補真陰以充八脈生脈散加熟地黃魚鰾山芋肉山藥歸身左牡蠣白蓮花熬膏案經以應月月以三旬而一盈經以三旬而一至象月滿則虧也虧極則病陰虧則火盛火盛則逼血妄行經以陰虛陽搏謂之崩也服藥以來崩漏雖止巔頂猶痛腹中䐃䐜脹厥陰之脈上出額與督脈會於巔頂下絡少腹水不涵木陰不斂陽巔痛腹脹脈尚軟數無神仍以壯水潛陽為主冀其血氣各守其鄉方無來復之患烏賊骨丸生脈散加生地知母玉竹棗仁牡蠣歸身白芍蜜丸案沖為血海下司肝腎上隸陽明經行飲冷瘕聚胞中延今十餘年經來臍下硬痛連及兩腰任脈亦病病深難於痊愈生化湯去熟地甘草加牛膝山楂艾葉赤砂糖童子小便案腹中素有血癥大如覆杯脈絡阻礙經血循環失其常度經不及期經前作痛氣鬱傷肝木乘土位飲食減少悲哀傷肺治節不行胸次不暢腰如束帶帶脈亦傷年逾三旬尚未妊子必得經候平調方能孕育四物湯歸脾湯去黃耆桂圓加艾葉新會皮動則為瘕瘕者假也氣也不動為癥癥者真也血也血癥盤踞居於中經血循常道阻月不及期期前作痛素多抑鬱悲傷生生之氣不振調肝脾以暢奇經宣抑鬱以舒神志歸脾湯去桂圓黃耆加生地白芍川芎會皮艾葉薑棗水泛丸左脈澀右脈弦肝鬱中傷氣血凝結經不通行氣脹腹痛飲食不思二陽之病發心脾有不得隱曲女子不月其傳為風消其傳為息賁者不治歸脾湯去黃耆加阿膠紅糖案月不及期腹痛腿痠飲食減少胸脅瘕塊氣鬱傷肝悲哀動中胸中作悶腰如束帶病在至陰肝脾俱病歸芍異功散加木香艾葉紅糖案瘕屬氣聚癥屬血結月不及期胸有癥塊氣鬱悲傷動中中傷積飲汩汩有聲寐來中州虛寒肝脾胃俱病治之不易香砂六君子湯加香附歸身薑棗又歸芍異功散加砂仁油桂薑棗次加遠志棗仁案年甫三一未經生育胸有癥結服藥五帖腹脹減半夜來濁痰甚多月不及期點滴淋漓四肢無力氣血雙虧肝脾俱病歸芍六君子湯加生地薑棗案脈來滑數而空似有胎而不果腹無堅硬之處非停瘀可比素本經事不調日晡熱頭痛時作時止陰虧血少病在肝脾木不調達土運郁壅崇土培木宣補中州觀其動靜佛手散加於朮陳皮砂仁茯苓制香附炒黃芩案脈左澀右弦肝虛氣血凝結經居四月似有胎而不固心悸脘痛漏淋不已氣聚為瘕肝為起病之原胃為傳病之所養心脾兼和肝胃歸脾湯去桂圓黃耆加山楂紅糖頃閲來原淋漓已止諸恙悉痊胎漏之傷元神未復黑歸脾湯加杜仲案診得六脈細數而弦每胎墮總在二三月腹內積有硬塊經謂妊娠司胎一月在肝二月在膽三月在心四月三焦五月在脾六月在胃七月在肺八月在大腸九月在腎十月膀胱此症總在二三月胎漏只緣肝膽血熱傷及心脾太少二陰受恙是以氣不充血積塊頻頻不化遵程法養正消積合養陰滋降以補天一之水和陰清熱以瀉地二之火擬益母勝金丹加減潞黨參茺蔚子箱當歸京三稜於潛術大熟地杭白芍蓬莪朮丹皮參制首烏雀腦芎制香附人中黃雞爪黃連川黃柏脈不應指胎元不長服回春丹安住亦必胎長為妙仍防流滑北沙參於白朮淮山藥酸棗仁細生地厚杜仲粉甘草南棗肉
