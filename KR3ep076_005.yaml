body:
  text: 補遺案霍亂轉筋陰陽乖隔寒暑交爭肢冷煩躁苔黃脈閉內陷之症姑六和加減恐難挽回六和湯去砂仁木瓜案飲食自倍腸胃兩傷經脈橫解腸澼為痔素本善飲濕甚中虛腸澼延綿不已虛氣下墜升降失常滯下甚多脹而不痛此屬虛也氣血交虧濕鬱化熱白頭翁湯去川黃柏加冬朮生地阿膠黃芩甘草炮薑伏龍肝案寒飲侵脾濕熱在胃脾受寒故多痰胃挾熱故下痢惟治未得法全以久痢不痊輒用攻克諸藥以致中土受傷漸成脾虛下陷之症急宜化痰去濕調和脾胃佐以暖腎之品則飧泄可瘳擬香砂六君合四神丸香砂六君子湯四神丸加薑棗案嘔吐清水痛則欲絶脈象細軟而澀大非所宜陳海皮使君子淡乾薑烏梅肉新會皮蘇荸薺案恙因肝鬱夾濕木旺土虧胸悶作嘔氣逆痰不升間有寒熱此肝虛濕患非客感也脈來細軟而滑速宜固正和中調脾滲濕煎丸並進尚可收功制首烏製半夏杭白芍白茯苓左牡蠣上廣皮建澤瀉生苡仁野鬱金案肝邪犯胃食入不爽日久防隔天台烏藥沉水香箱歸尾上廣皮黃鬱金杭白芍桃仁泥白茯苓丸方赤石脂歸身沉香乳香狗寶老式琥珀麝香大玉紅為丸硃砂為衣案恙因病後傷脾中焦缺運以致目面黃瘦四肢冷中氣虛食難消化兼之便溏乃脾胃虛弱無火不能消穀胃難納脾難運納化皆難症勢危也速宜補火生土為佳但桂附之品一時難以驟用擬方候酌廣木香於術炭淮山藥杭白芍炒米仁炒穀芽建澤瀉白茯苓廣陳皮早服香砂丸晚服加味六君煎案氣積上衝則膨脹咳逆多痰此脾濕生痰痰延傷肺以致肝血不能榮潤故積塊亦覺堅硬治宜扶土和肝舒肺白蔻衣臺烏藥杭白芍建澤瀉沉水香淮山藥蓬莪朮製半夏當歸尾生苡仁案恙由三陰瘧後腹右成塊胸悶不舒此邪熱之傷肝脾逆成瘧母治宜養正消積制首烏京三稜全當歸廣橘白絡各紋黨參淮牛膝杭白芍冬瓜皮於白朮川鬱金案兩脅及胃不舒肌膚時熱自汗經云汗者心之液又云寒熱起於肝膽況兩脅皆屬肝部和榮衛益肝脾調養久而自健大熟地箱當歸金叉斛金毛狗脊去皮切麻黃根杭白芍白茯神淮山藥案酒濕傷陰心脾腎三陰不足手足振掉莫能自主巔眩目中生花脈細數無力非少壯所宜有陰痱之患宜壯水生陰助土滲濕七福飲去當歸加枸杞澤瀉茯苓牛膝案濕熱傷陰中虛濕勝脾主四肢戰栗動搖火之象也濕熱化火蘊於中州以致兩手動無寧息診脈軟數無神治宜培補心脾參入甘溫壯水之品黑歸脾湯去桂圓加川黃柏廣陳皮案兩手攣搐一哭而解前屢服和肝調氣不效繼加以化痰瀉肺漸竟稍愈經雲精氣並於肺則悲仍以平肝加以清肺熱久服自可獲效箱當歸化橘紅酸棗仁苦杏仁杭白芍大麥冬炙遠志玉桔梗川雅連炒子芩白芥子白茯苓用鮮竹二青煎水調勻案脾濕侵肺浮腫喘促夜不能臥胸膈缺舒白蘇子製半夏枯穀芽甜杏仁葶藶子廣橘紅白茯苓生苡仁冬瓜子案脾有濕痰肺有積火雖咳久面浮非虛症也製半夏化橘白光杏仁薏苡仁赤蘇子白茯苓淮山藥鮮石斛案足腫漸消發黃不透脾虛生濕濕積傷脾乃燥脾滲濕主治西茵陳焦冬朮冬瓜子生苡仁桂枝木青廣皮當道子黑薑炭赤茯苓服扶脾燥濕之劑黃漸外達濕鬱傷脾先宜通利達下從小腸膀胱出經所謂開潔淨者是也前方去冬瓜子桂木加歸尾甘草梢澤瀉案服調氣暢中木榮土漸旺六脈稍覺和緩緣陽在外為陰之使陰在內為陽之守扶陽即所以固氣氣和而胃自調照前煎方主治白首烏全當歸冬瓜皮白扁豆黃耆皮杭白芍於白朮白茯苓上桂心廣橘絡穀芽須遠志肉案陰液不充腎之水虧肝之陽強精氣並於肝則怒滋水緩肝培養久能獲效大生熟地全當歸杜阿膠炙遠志鮮首烏杭白芍冬青子棗仁炭沙苑蒺藜霜桑葉胡芡實白茯苓神左牡蠣黑芝麻牡丹皮珠麥冬集方四君子湯人參白朮茯苓甘草香砂四君子湯四君子湯加木香砂仁歸芍四君子湯四君子湯加當歸芍藥五味異功散四君子湯加陳皮歸芍異功散五味異功散加當歸芍藥六君子湯五味異功散加半夏香砂六君子湯六君子湯加木香砂仁歸芍六君子湯六君子湯加當歸芍藥金水六君煎二陳湯加熟地當歸苓桂朮甘湯茯苓桂枝白朮甘草半夏茯苓湯半夏茯苓二陳湯半夏陳皮茯苓甘草杏蘇二陳湯二陳湯加蘇葉杏仁歸芍二陳湯二陳湯加當歸芍藥益氣健脾丸五味異功散加枳實外臺茯苓飲益氣健脾丸去甘草加枳殼何人飲何首烏當歸人參陳皮煨姜六味地黃丸地黃山芋肉山藥茯苓丹皮澤瀉桂附地黃丸六味地黃丸加附子肉桂知柏地黃丸六味地黃丸加知母黃柏歸芍地黃丸六味地黃丸加當歸芍藥桑麻地黃丸六味地黃丸加桑葉巨勝子濟陰地黃丸熟地黃山藥山芋肉當歸枸杞巴戟麥冬蓯蓉五味甘菊八仙長壽丹六味地黃丸加五味麥冬金匱腎氣丸桂附地黃丸加牛膝車前子附都氣丸六味地黃丸加五味附子地黃飲子熟地巴戟山芋蓯蓉附子肉桂石斛茯苓遠志麥冬五味石菖蒲左歸丸熟地山藥枸杞山芋牛膝菟絲子鹿角膠龜板膠七福飲人參熟地當歸白朮甘草棗仁遠志一陰煎生地熟地芍藥麥冬甘草牛膝丹參四陰煎生地麥冬白芍百合沙參甘草茯苓大營煎當歸熟地枸杞甘草杜仲牛膝肉桂還元丹一名延年益壽不老丹人參固本丸加地骨皮茯苓人參固本丸人參天冬麥冬生地熟地三才湯天冬地黃人參生脈散人參麥冬五味二至丸冬青子旱蓮草歸脾湯人參白朮茯神棗仁桂圓肉黃耆當歸遠志木香甘草四物湯生地當歸芍藥川芎八珍湯四物湯四君子湯十全大補湯八珍湯加黃耆肉桂十四味建中湯十全大補湯加附子半夏蓯蓉麥冬補中益氣湯人參黃耆甘草白朮陳皮當歸升麻柴胡補陰益氣煎人參熟地當歸陳皮山藥甘草升麻柴胡天王補心丹生地人參元參丹參茯苓桔梗遠志天冬麥冬當歸柏子仁棗仁五味孔聖枕中丹敗龜板青龍骨九節石菖蒲遠志筒平補正心丹人參龍齒白茯苓茯神麥冬五味當歸遠志天麥山藥熟地硃砂棗仁菖蒲柏子明目羊肝丸古勇人參麥冬柴胡當歸牛膝防風熟地羌活枸杞青鹽黃柏肉桂九孔石決明龍膽草家菊花羯羊肝麻黃湯麻黃桂枝杏仁甘草桂枝湯桂枝芍藥甘草生薑大棗小青龍湯麻黃桂枝細辛乾薑芍藥五味半夏甘草小柴胡湯柴胡半夏黃芩人參甘草生薑大棗玉屏風散黃耆防風白朮升麻葛根湯升麻葛根芍藥甘草定喘湯麻黃白果半夏蘇子款冬花杏仁黃芩桑白皮九味羌活湯一名羌活沖和湯羌活防風蒼朮細辛川芎白芷生地黃芩甘草人參敗毒散人參羌活獨活柴胡前胡桔梗川芎茯苓甘草枳殼清暑益氣湯人參白朮神麯葛根青皮陳皮甘草麥冬五味當歸黃柏澤瀉升麻黃耆蒼朮藿香正氣散藿香白芷白朮半夏茯苓紫蘇川朴桔梗陳皮甘草大腹皮達原飲檳榔厚朴草果芍藥黃芩甘草知母六和湯藿香砂仁厚朴杏仁半夏扁豆木瓜人參白朮甘草赤茯苓平胃散川朴蒼朮廣陳皮甘草參附湯人參附子六味回陽飲人參附子熟地歸身炮姜甘草溫膽湯二陳湯加枳實竹茹十味溫膽湯溫膽湯加人參遠志棗仁熟地半夏瀉心湯半夏川連黃芩人參甘草乾薑大棗半夏秫米湯半夏秫米橘皮竹茹湯橘皮竹茹人參甘草半夏麥冬赤茯苓枇杷葉小陷胸湯雅連栝樓半夏左金丸黃連吳茱萸大半夏湯一名參蜜半夏湯人參白蜜半夏甘麥大棗湯甘草小麥大棗白虎湯石膏知母甘草粳米人參白虎湯白虎湯加人參犀角地黃湯犀角生地白芍丹皮清燥救肺湯人參石膏麥冬杏仁桑葉阿膠胡麻甘草枇杷葉玉女煎石膏熟地麥冬知母牛膝百花膏百合款冬花豬膚湯豬膚白蜜白粉甘桔湯甘草桔梗葦莖湯葦莖苡仁桃仁瓜瓣雪羹湯海蜇荸薺復脈湯一名炙甘草湯炙甘草桂枝人參麻仁生地阿膠麥冬薑棗二妙散蒼朮黃柏二冬膏天冬麥冬七正散龍膽草山梔仁甘草梢芣苡子木通赤茯苓萹蓄芍藥湯芍藥歸尾黃芩肉桂大古勇大黃檳榔甘草白頭翁湯白頭翁北秦皮川連川柏瀉白散桑白皮地骨皮甘草粳米清胃散生地丹皮黃連當歸升麻四神丸破故紙遼五味肉蓯蓉吳茱萸蠲痹湯黃耆當歸赤芍羌活防風片子薑黃甘草蒼耳散白芷薄荷辛夷蒼耳子半夏白朮天麻湯半夏白朮天麻麥芽神麯蒼朮人參黃耆陳皮茯苓乾薑黃柏玉燭散生地歸尾赤芍川芎甘草生軍芒硝真人養臟湯罌粟殼訶子木香肉蔻安邊桂白朮甘草白芍桃花湯生地赤石脂乾薑粳米導赤散生地木通甘草梢淡竹葉三陰煎當歸熟地甘草芍藥棗仁人參斑龍丸鹿角膠鹿霜熟地菟絲子柏子仁理中湯白朮人參乾薑甘草蘇合香丸蘇合香龍腦香熏陸香丁香原寸香安息香沉水香香附廣木香烏犀角於白朮硃砂衣虎潛丸川柏牛膝白芍陳皮虎脛骨知母龜板鎖陽當歸羯羊肉熟地青娥丸破故紙胡桃肉杜仲保和丸山楂神麯半夏陳皮萊蔔子連翹茯苓十九味資生丸人參山楂蓮肉苡仁云術茯苓山藥甘草桔梗麥芽芡實白蔻仁陳皮藿香神麯白扁豆川連厚朴澤瀉一本無厚朴減連資生丸十九味資生丸去川連枳朮丸白朮枳實逍遙散柴胡當歸芍藥白朮茯苓甘草推氣散桂心枳殼甘草片子薑黃佛手散一名芎歸湯亦名一奇散亦名君臣散川芎當歸益母丸益母草香橘湯香附橘紅半夏甘草元金散一名金鈴子散川楝子延胡索膠艾湯阿膠蘄艾生化湯當歸川芎焦姜桃仁甘草熟地香砂丸木香砂仁烏賊骨丸烏賊骨蘆茹雀卵鮑魚
