body:
  text: 序吾鄉王九峰先生精於岐黃上自靈素下逮薛喻諸家無不研求貫串出其方劑無不應手奏效求治者日益多馳名於江南北吳江徐靈胎先生即九峰之師也徐先生歿後論良醫者莫不嘖嘖稱九峰顧自洪楊之後醫案散佚未有專書余少嗜醫理前在邗江獲見徐蔭庭所抄九峰醫案借歸讀之見其論症選藥思路深細用法精到頗能獨開生面發前人之未發因抄成冊繼到京師與同里王紹棠同寓紹棠所錄同里蔣寶素醫略載有九峰醫案寶素其高足也乃復另抄一冊暇與紹棠縱談醫理出其所抄九峰醫案三本取而比較大略相同第皆序次紊亂閱者不能爽目又展轉傳抄魯魚亥豕所在多有爰為審批排比簡其精粹分其門類正其錯誤稍稍劃一其有錯落訛誤無從更正者一仍其舊從疑以存疑之例蓋慎之也以醫略中所載為正卷後編者為副卷嗣又得若干條歸入補遺此後如再有所獲續為搜人惟校勘恐有未當尚希同志之士匡我不逮錄成其志緣起如此時民國十二年八月望日朱方嚴敦益受甫氏號漁隱識于都門
